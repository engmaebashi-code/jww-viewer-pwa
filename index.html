<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>JWW Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Courier New',monospace;overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;height:44px;background:#161b22;
  border-bottom:2px solid #21262d;display:flex;align-items:center;
  padding:0 8px;gap:4px;z-index:100;overflow-x:auto}
#hdr h1{font-size:12px;color:#58a6ff;letter-spacing:2px;white-space:nowrap;margin-right:4px;flex-shrink:0}
.btn{padding:4px 8px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  cursor:pointer;font-size:10px;border-radius:4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#30363d;border-color:#58a6ff}
.btn.on{background:#1f6feb;border-color:#58a6ff;color:#fff}
.btn.open{background:#238636;border-color:#3fb950;color:#fff}
.btn.open:hover{background:#2ea043}
select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  padding:3px 5px;border-radius:4px;font-size:10px;cursor:pointer;flex-shrink:0}
.sep{width:1px;height:24px;background:#30363d;margin:0 2px;flex-shrink:0}
.lbtn{padding:3px 7px;font-size:10px;border-radius:3px;cursor:pointer;
  border:1px solid #30363d;background:#21262d;transition:all .15s;white-space:nowrap;flex-shrink:0}
.lbtn.on{font-weight:bold}
#stbar{position:fixed;bottom:0;left:0;right:0;height:24px;background:#161b22;
  border-top:1px solid #21262d;display:flex;align-items:center;
  padding:0 10px;gap:12px;font-size:10px;color:#8b949e;z-index:100}
.v{color:#58a6ff}
#wrap{position:fixed;top:44px;left:0;right:0;bottom:24px}
canvas{display:block}
#mbox{position:fixed;top:52px;right:8px;background:#161b22;
  border:1px solid #30363d;border-radius:8px;padding:12px 14px;
  min-width:200px;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#mbox h3{font-size:10px;color:#8b949e;margin-bottom:6px}
#dval{font-size:26px;color:#3fb950;font-weight:bold}
#dunit{font-size:10px;color:#8b949e;margin-top:2px}
#ddet{font-size:10px;color:#6e7681;margin-top:5px;line-height:1.8}
#dhint{font-size:11px;color:#f0883e;margin-top:5px}
#sni{position:fixed;display:none;pointer-events:none;z-index:300;
  width:12px;height:12px;border:2px solid #3fb950;border-radius:50%;
  transform:translate(-50%,-50%)}
#splash{position:fixed;top:44px;left:0;right:0;bottom:24px;display:flex;
  align-items:center;justify-content:center;z-index:50;background:#0d1117}
#splash-inner{text-align:center;padding:40px}
#splash-inner h2{font-size:20px;color:#58a6ff;margin-bottom:16px}
#splash-inner p{font-size:13px;color:#8b949e;margin-bottom:24px;line-height:1.6}
#splash-inner .open-large{padding:16px 40px;font-size:16px;background:#238636;
  border:2px solid #3fb950;color:#fff;border-radius:8px;cursor:pointer;
  transition:all .2s}
#splash-inner .open-large:hover{background:#2ea043;transform:scale(1.05)}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,17,23,0.9);
  display:none;align-items:center;justify-content:center;z-index:1000;font-size:16px;color:#58a6ff}

/* Layer panel */
#lpanel{position:fixed;top:44px;left:0;right:0;background:#161b22;
  border-bottom:2px solid #21262d;display:none;z-index:90;padding:6px 10px;
  font-size:10px}
#lpanel.show{display:block}
#lgroups{display:flex;gap:2px;margin-bottom:4px;align-items:center;flex-wrap:wrap}
#lgroups .glabel{color:#8b949e;margin-right:2px;flex-shrink:0}
.gbtn{padding:2px 6px;border-radius:3px;cursor:pointer;border:1px solid #30363d;
  background:#21262d;color:#6e7681;font-size:10px;transition:all .12s;min-width:22px;text-align:center}
.gbtn.on{background:#1f6feb;border-color:#58a6ff;color:#fff}
.gbtn.has{color:#c9d1d9}
.gbtn.cur{box-shadow:0 0 0 2px #f0883e}
#llayers{display:flex;gap:2px;align-items:center;flex-wrap:wrap}
#llayers .llabel{color:#8b949e;margin-right:2px;flex-shrink:0}
.lbtn2{padding:2px 6px;border-radius:3px;cursor:pointer;border:1px solid #30363d;
  background:#21262d;color:#6e7681;font-size:10px;transition:all .12s;min-width:22px;text-align:center}
.lbtn2.on{font-weight:bold}
.lbtn2.has{color:#c9d1d9}
#linfo{color:#6e7681;font-size:9px;margin-top:3px}

@supports(padding: env(safe-area-inset-top)){
  #hdr{padding-top:env(safe-area-inset-top);height:calc(44px + env(safe-area-inset-top))}
  #wrap{top:calc(44px + env(safe-area-inset-top))}
  #splash{top:calc(44px + env(safe-area-inset-top))}
  #stbar{padding-bottom:env(safe-area-inset-bottom);height:calc(24px + env(safe-area-inset-bottom))}
  #wrap{bottom:calc(24px + env(safe-area-inset-bottom))}
}
@media(min-width:768px){
  .btn{padding:6px 12px;font-size:12px}
  .lbtn{padding:5px 10px;font-size:12px}
  #stbar{font-size:12px}
  select{font-size:12px;padding:4px 8px}
}
</style>

<body>

  <label style="font-size:10px;color:#8b949e;display:flex;align-items:center;gap:3px;flex-shrink:0">

</div>
<div id="splash">
  <div id="splash-inner">
    <h2>JWW Viewer v14</h2>
    <p>Jw_cad&#x56F3;&#x9762;&#x30D3;&#x30E5;&#x30FC;&#x30A2;<br>JWW&#x30D5;&#x30A1;&#x30A4;&#x30EB;&#x3092;&#x958B;&#x3044;&#x3066;&#x95B2;&#x89A7;&#x30FB;&#x8A08;&#x6E2C;&#x3067;&#x304D;&#x307E;&#x3059;<br>
    <small style="color:#6e7681">MFC&#x6E96;&#x62E0;&#x30D1;&#x30FC;&#x30B5;&#x30FC;&#x30FB;&#x30EC;&#x30A4;&#x30E4;&#x30FC;&#x5BFE;&#x5FDC;&#x30FB;&#x7E2E;&#x5C3A;&#x81EA;&#x52D5;&#x691C;&#x51FA;</small></p>
    <button class="open-large" onclick="document.getElementById('filein').click()">&#x1F4C2; JWW&#x30D5;&#x30A1;&#x30A4;&#x30EB;&#x3092;&#x958B;&#x304F;</button>
  </div>
</div>
<div id="loading">&#x1F4D0; &#x89E3;&#x6790;&#x4E2D;...</div>
<div id="stbar">
  &#x30E2;&#x30FC;&#x30C9;:<span class="v" id="sm">&#x8868;&#x793A;</span>

  &nbsp;&#x30BA;&#x30FC;&#x30E0;:<span class="v" id="sz">1x</span>
  &nbsp;&#x7E2E;&#x5C3A;:<span class="v" id="sscale">---</span>
</div>

<script>
// ===== JWW Layer Colors (dark background optimized) =====
var LAYER_COLORS = [
  '#e6edf3', '#58a6ff', '#3fb950', '#bc8cff',
  '#388bfd', '#d29922', '#f0883e', '#f85149',
  '#c9d1d9', '#79c0ff', '#56d364', '#d2a8ff',
  '#6cb6ff', '#e3b341', '#ffa657', '#ff7b72',
];
var HEX = '0123456789ABCDEF';

function penWidth(pen, sc) {
  return Math.max(0.5, sc * 0.04);
}

// ===== MFC-aware JWW Binary Parser (v14) =====
function parseJWW(buffer) {
  var data = new Uint8Array(buffer);
  var view = new DataView(buffer);
  var len = data.length;

  if (len < 12 || String.fromCharCode.apply(null, data.slice(0, 7)) !== 'JwwData')
    throw new Error('JWW\u30D5\u30A1\u30A4\u30EB\u3067\u306F\u3042\u308A\u307E\u305B\u3093');

  var version = view.getUint32(8, true);
  var cdSz = (version >= 351) ? 15 : 13;

  var lines = [], arcs = [], texts = [];
  var sjis = new TextDecoder('shift_jis');
  var utf16 = new TextDecoder('utf-16le');

  // ---- Find ASCII byte sequence in binary ----
  function findStr(str, from) {
    var nl = str.length;
    outer: for (var i = from || 0; i <= len - nl; i++) {
      for (var j = 0; j < nl; j++) {
        if (data[i + j] !== str.charCodeAt(j)) continue outer;
      }
      return i;
    }
    return -1;
  }

  // ---- Find MFC class definition ----
  function findClassDef(className) {
    var pos = findStr(className, 6);
    if (pos < 6) return -1;
    if (view.getUint16(pos - 6, true) === 0xFFFF &&
        view.getUint16(pos - 2, true) === className.length)
      return pos + className.length;
    return -1;
  }

  // ---- Parse CData base header ----
  function parseCData(off) {
    if (off + cdSz > len) return null;
    var lOff = cdSz === 15 ? 9 : 7;
    var gOff = cdSz === 15 ? 11 : 9;
    var layer = view.getUint16(off + lOff, true);
    var glayer = view.getUint16(off + gOff, true);
    if (layer > 15 || glayer > 15) return null;
    return {
      penStyle: data[off + 4],
      penColor: view.getUint16(off + 5, true),
      layer: layer,
      glayer: glayer,
      _end: off + cdSz
    };
  }

  // ---- Read MFC CString (UTF-16LE or Shift-JIS) ----
  function readCStr(pos) {
    if (pos + 1 >= len) return null;
    if (pos + 4 <= len && data[pos] === 0xFF && data[pos+1] === 0xFE && data[pos+2] === 0xFF) {
      var cc, hdr;
      if (data[pos + 3] < 0xFF) {
        cc = data[pos + 3]; hdr = pos + 4;
      } else {
        if (pos + 6 > len) return null;
        var w = view.getUint16(pos + 4, true);
        if (w === 0xFFFF) {
          if (pos + 10 > len) return null;
          cc = view.getUint32(pos + 6, true); hdr = pos + 10;
        } else { cc = w; hdr = pos + 6; }
      }
      if (cc > 50000 || hdr + cc * 2 > len) return null;
      try { return { text: utf16.decode(data.slice(hdr, hdr + cc * 2)), end: hdr + cc * 2 }; }
      catch(e) { return null; }
    }
    var bc2, hdr2;
    if (data[pos] < 0xFF) {
      bc2 = data[pos]; hdr2 = pos + 1;
    } else {
      if (pos + 3 > len) return null;
      var w2 = view.getUint16(pos + 1, true);
      if (w2 === 0xFFFF) {
        if (pos + 7 > len) return null;
        bc2 = view.getUint32(pos + 3, true); hdr2 = pos + 7;
      } else { bc2 = w2; hdr2 = pos + 3; }
    }
    if (bc2 > 50000 || hdr2 + bc2 > len) return null;
    if (bc2 === 0) return { text: '', end: hdr2 };
    try { return { text: sjis.decode(data.slice(hdr2, hdr2 + bc2)), end: hdr2 + bc2 }; }
    catch(e) { return null; }
  }

  // ===== Read group scales from header =====
  // Groups 0-F each have a CString name followed by fields, with scale at offset +16 after name end
  // Stride between groups: 148 bytes
  var scales = [];
  try {
    var nameR = readCStr(12);
    if (nameR) {
      var firstScale = nameR.end + 16;
      for (var gi = 0; gi < 16; gi++) {
        var sOff = firstScale + gi * 148;
        if (sOff + 8 <= len) {
          var sv = view.getFloat64(sOff, true);
          if (isFinite(sv) && sv >= 0.1 && sv <= 100000) {
            scales.push(sv);
          } else {
            scales.push(1);
          }
        } else {
          scales.push(1);
        }
      }
    }
  } catch(e) {
    // fallback: no scale info
  }
  if (scales.length < 16) {
    while (scales.length < 16) scales.push(100);
  }

  // ---- Scan boundary ----
  var listDef = findClassDef('CDataList');
  var scanEnd = listDef > 0 ? listDef : len;

  // ===== Parse CDataSen (lines) =====
  var senDef = findClassDef('CDataSen');
  if (senDef > 0) {
    var cd0 = parseCData(senDef);
    if (cd0 && cd0._end + 32 <= len) {
      var o = cd0._end;
      var sx1 = view.getFloat64(o, true), sy1 = view.getFloat64(o+8, true);
      var sx2 = view.getFloat64(o+16, true), sy2 = view.getFloat64(o+24, true);
      if ([sx1,sy1,sx2,sy2].every(function(v){return isFinite(v) && Math.abs(v)<1e7;})) {
        var sll = Math.hypot(sx2-sx1, sy2-sy1);
        if (sll > 0.001 && sll < 1e7)
          lines.push({x1:sx1, y1:sy1, x2:sx2, y2:sy2, pen:cd0.penColor, layer:cd0.layer, glayer:cd0.glayer});
      }
      var st = o + 32;
      if (st + 1 < len && (data[st+1] & 0x80)) {
        var stag0 = data[st], stag1 = data[st+1];
        for (var si = st; si < scanEnd - (2 + cdSz + 32); si++) {
          if (data[si] === stag0 && data[si+1] === stag1) {
            var scd = parseCData(si + 2);
            if (!scd) continue;
            var so = scd._end;
            if (so + 32 > len) continue;
            var lx1 = view.getFloat64(so, true), ly1 = view.getFloat64(so+8, true);
            var lx2 = view.getFloat64(so+16, true), ly2 = view.getFloat64(so+24, true);
            if ([lx1,ly1,lx2,ly2].every(function(v){return isFinite(v) && Math.abs(v)<1e7;})) {
              var ll = Math.hypot(lx2-lx1, ly2-ly1);
              if (ll > 0.001 && ll < 1e7) {
                lines.push({x1:lx1, y1:ly1, x2:lx2, y2:ly2, pen:scd.penColor, layer:scd.layer, glayer:scd.glayer});
                si = so + 31;
              }
            }
          }
        }
      }
    }
  }

  // ===== Parse CDataEnko (arcs/circles) =====
  var enkDef = findClassDef('CDataEnko');
  if (enkDef > 0) {
    function parseArc(cdOff) {
      var cd = parseCData(cdOff);
      if (!cd || cd._end + 60 > len) return null;
      var ao = cd._end;
      var cx = view.getFloat64(ao, true), cy = view.getFloat64(ao+8, true);
      var r = view.getFloat64(ao+16, true), sa = view.getFloat64(ao+24, true);
      var arcA = view.getFloat64(ao+32, true), tilt = view.getFloat64(ao+40, true);
      var flat = view.getFloat64(ao+48, true), full = view.getUint32(ao+56, true);
      if (!isFinite(cx) || !isFinite(cy) || !isFinite(r) || r <= 0 || r > 1e7 ||
          Math.abs(cx) > 1e7 || Math.abs(cy) > 1e7) return null;
      var isCircle = full === 1 || Math.abs(Math.abs(arcA) - Math.PI * 2) < 0.01;
      arcs.push({
        cx:cx, cy:cy, r:r, sa:sa, ea:sa+arcA, tilt:tilt, flat:flat,
        cat: isCircle ? 'circle' : 'arc',
        pen: cd.penColor, layer: cd.layer, glayer: cd.glayer
      });
      return ao + 60;
    }
    var aEndOff = parseArc(enkDef);
    if (aEndOff && aEndOff + 1 < len && (data[aEndOff+1] & 0x80)) {
      var atag0 = data[aEndOff], atag1 = data[aEndOff+1];
      for (var ai = aEndOff; ai < scanEnd - (2 + cdSz + 60); ai++) {
        if (data[ai] === atag0 && data[ai+1] === atag1) {
          var ar2 = parseArc(ai + 2);
          if (ar2) ai = ar2 - 1;
        }
      }
    }
  }

  // ===== Parse CDataMoji (text) =====
  var mojiDef = findClassDef('CDataMoji');
  if (mojiDef > 0) {
    function parseMoji(cdOff) {
      var cd = parseCData(cdOff);
      if (!cd || cd._end + 68 > len) return null;
      var mo = cd._end;
      var mx1 = view.getFloat64(mo, true), my1 = view.getFloat64(mo+8, true);
      var msX = view.getFloat64(mo+36, true), msY = view.getFloat64(mo+44, true);
      var mkak = view.getFloat64(mo+60, true);
      if (!isFinite(mx1) || !isFinite(my1) || Math.abs(mx1) > 1e7 || Math.abs(my1) > 1e7) return null;
      if (!isFinite(msX) || msX <= 0 || msX > 10000) return null;
      if (!isFinite(msY) || msY <= 0 || msY > 10000) return null;
      var fontR = readCStr(mo + 68);
      if (!fontR) return null;
      var textR = readCStr(fontR.end);
      if (!textR || textR.text.length === 0) return null;
      texts.push({
        x: mx1, y: my1,
        sz: Math.max(msX, msY),
        text: textR.text,
        angle: mkak,
        layer: cd.layer,
        glayer: cd.glayer
      });
      return textR.end;
    }
    var mEndOff = parseMoji(mojiDef);
    if (mEndOff && mEndOff + 1 < len && (data[mEndOff+1] & 0x80)) {
      var mtag0 = data[mEndOff], mtag1 = data[mEndOff+1];
      for (var mi = mEndOff; mi < scanEnd - 20; mi++) {
        if (data[mi] === mtag0 && data[mi+1] === mtag1) {
          var mr = parseMoji(mi + 2);
          if (mr) mi = mr - 1;
        }
      }
    }
  }

  // ===== Build snap points =====
  var snap = [];
  var snapSet = new Set();
  for (var li = 0; li < lines.length; li++) {
    var l = lines[li];
    var pts2 = [[l.x1, l.y1], [l.x2, l.y2]];
    for (var pi = 0; pi < 2; pi++) {
      var k = Math.round(pts2[pi][0] * 10) + ',' + Math.round(pts2[pi][1] * 10);
      if (!snapSet.has(k)) { snapSet.add(k); snap.push(pts2[pi]); }
    }
  }

  return { lines: lines, arcs: arcs, texts: texts, snap: snap, scales: scales, version: version };
}

// ===== Viewer State =====
var LINES = [], ARCS = [], TEXTS = [], SNAP = [];
var vis = { line: true, arc: true, text: true };
var sf = 100;
var scaleMode = 'auto';
var groupScales = []; // scales[0..15] from file
var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');
var sni = document.getElementById('sni');
var mode = 'view', tx = 0, ty = 0, sc = 1, drag = false, dx0 = 0, dy0 = 0, pts = [];

// ===== Layer Visibility =====
var glayerVis = []; // [0..15] = true/false
var layerVis = [];  // [0..15][0..15] = true/false
var curGroup = 0;   // currently selected group for layer display
var layerCounts = []; // [g][l] = count of entities

function initLayers() {
  glayerVis = [];
  layerVis = [];
  layerCounts = [];
  for (var g = 0; g < 16; g++) {
    glayerVis.push(true);
    layerVis.push([]);
    layerCounts.push([]);
    for (var l = 0; l < 16; l++) {
      layerVis[g].push(true);
      layerCounts[g].push(0);
    }
  }
}
initLayers();

function countLayers() {
  for (var g = 0; g < 16; g++)
    for (var l = 0; l < 16; l++)
      layerCounts[g][l] = 0;

  var allItems = LINES.concat(ARCS).concat(TEXTS);
  for (var i = 0; i < allItems.length; i++) {
    var it = allItems[i];
    var g = it.glayer || 0;
    var l = it.layer || 0;
    if (g >= 0 && g < 16 && l >= 0 && l < 16)
      layerCounts[g][l]++;
  }
}

function groupTotal(g) {
  var t = 0;
  for (var l = 0; l < 16; l++) t += layerCounts[g][l];
  return t;
}

function isEntityVisible(item) {
  var g = item.glayer || 0;
  var l = item.layer || 0;
  return glayerVis[g] && layerVis[g][l];
}

// ===== Layer Panel UI =====
function toggleLayerPanel() {
  var p = document.getElementById('lpanel');
  p.classList.toggle('show');
  var b = document.getElementById('layerbtn');
  b.classList.toggle('on', p.classList.contains('show'));
  updateWrapTop();
}

function updateWrapTop() {
  var p = document.getElementById('lpanel');
  var wrap = document.getElementById('wrap');
  var splash = document.getElementById('splash');
  if (p.classList.contains('show')) {
    var h = p.offsetHeight;
    wrap.style.top = (44 + h) + 'px';
    splash.style.top = (44 + h) + 'px';
  } else {
    wrap.style.top = '44px';
    splash.style.top = '44px';
  }
  resize();
}

function buildLayerUI() {
  var gDiv = document.getElementById('lgroups');
  gDiv.innerHTML = '<span class="glabel">G:</span>';
  for (var g = 0; g < 16; g++) {
    var btn = document.createElement('div');
    btn.className = 'gbtn';
    btn.textContent = HEX[g];
    btn.setAttribute('data-g', g);
    var gt = groupTotal(g);
    if (gt > 0) btn.classList.add('has');
    if (glayerVis[g]) btn.classList.add('on');
    if (g === curGroup) btn.classList.add('cur');
    btn.onclick = (function(gg) {
      return function(e) {
        if (e.shiftKey) {
          // Shift+click: toggle group visibility
          glayerVis[gg] = !glayerVis[gg];
        } else {
          // Normal click: select this group for layer display
          curGroup = gg;
        }
        buildLayerUI();
        draw();
      };
    })(g);
    gDiv.appendChild(btn);
  }

  // Add "All ON" / "All OFF" buttons for groups
  var allOnG = document.createElement('div');
  allOnG.className = 'gbtn';
  allOnG.textContent = 'All';
  allOnG.style.marginLeft = '4px';
  allOnG.style.color = '#3fb950';
  allOnG.onclick = function() {
    for (var i = 0; i < 16; i++) glayerVis[i] = true;
    buildLayerUI(); draw();
  };
  gDiv.appendChild(allOnG);

  // Build layer buttons for current group
  var lDiv = document.getElementById('llayers');
  lDiv.innerHTML = '<span class="llabel">L(G' + HEX[curGroup] + '):</span>';
  for (var l = 0; l < 16; l++) {
    var lbtn = document.createElement('div');
    lbtn.className = 'lbtn2';
    lbtn.textContent = HEX[l];
    lbtn.setAttribute('data-l', l);
    var lc = layerCounts[curGroup][l];
    if (lc > 0) lbtn.classList.add('has');
    if (layerVis[curGroup][l]) {
      lbtn.classList.add('on');
      lbtn.style.color = LAYER_COLORS[l];
      lbtn.style.borderColor = LAYER_COLORS[l];
    }
    lbtn.title = lc + ' entities';
    lbtn.onclick = (function(ll) {
      return function() {
        layerVis[curGroup][ll] = !layerVis[curGroup][ll];
        buildLayerUI();
        draw();
      };
    })(l);
    lDiv.appendChild(lbtn);
  }

  // All ON/OFF for layers
  var allOnL = document.createElement('div');
  allOnL.className = 'lbtn2';
  allOnL.textContent = 'All';
  allOnL.style.marginLeft = '4px';
  allOnL.style.color = '#3fb950';
  allOnL.onclick = function() {
    for (var i = 0; i < 16; i++) layerVis[curGroup][i] = true;
    buildLayerUI(); draw();
  };
  lDiv.appendChild(allOnL);

  var noneL = document.createElement('div');
  noneL.className = 'lbtn2';
  noneL.textContent = 'None';
  noneL.style.color = '#f85149';
  noneL.onclick = function() {
    for (var i = 0; i < 16; i++) layerVis[curGroup][i] = false;
    buildLayerUI(); draw();
  };
  lDiv.appendChild(noneL);

  // Info line
  var info = document.getElementById('linfo');
  var gsc = groupScales[curGroup] || 100;
  info.textContent = 'G' + HEX[curGroup] + ': ' + groupTotal(curGroup) + ' entities, scale 1/' + gsc;
}

function tog(k, el) { vis[k] = !vis[k]; el.classList.toggle('on', vis[k]); draw(); }
function resize() { cv.width = cv.parentElement.clientWidth; cv.height = cv.parentElement.clientHeight; draw(); }

function fitView() {
  if (LINES.length === 0 && ARCS.length === 0) return;
  var x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  LINES.forEach(function(l) {
    if (!isEntityVisible(l)) return;
    x0 = Math.min(x0, l.x1, l.x2); x1 = Math.max(x1, l.x1, l.x2);
    y0 = Math.min(y0, l.y1, l.y2); y1 = Math.max(y1, l.y1, l.y2);
  });
  ARCS.forEach(function(a) {
    if (!isEntityVisible(a)) return;
    x0 = Math.min(x0, a.cx - a.r); x1 = Math.max(x1, a.cx + a.r);
    y0 = Math.min(y0, a.cy - a.r); y1 = Math.max(y1, a.cy + a.r);
  });
  if (!isFinite(x0)) return;
  var dw = x1 - x0, dh = y1 - y0;
  sc = Math.min(cv.width / dw, cv.height / dh) * 0.88;
  tx = cv.width / 2 - (x0 + dw / 2) * sc;
  ty = cv.height / 2 + (y0 + dh / 2) * sc;
  draw();
}

var S = function(wx, wy) { return { x: wx * sc + tx, y: -wy * sc + ty }; };
var W = function(sx, sy) { return { x: (sx - tx) / sc, y: -(sy - ty) / sc }; };

function snapPt(sx, sy) {
  if (!document.getElementById('snp').checked) return null;
  var b = null, bd = 15;
  for (var i = 0; i < SNAP.length; i++) {
    var s = S(SNAP[i][0], SNAP[i][1]);
    var d = Math.hypot(s.x - sx, s.y - sy);
    if (d < bd) { bd = d; b = { wx: SNAP[i][0], wy: SNAP[i][1], sx: s.x, sy: s.y }; }
  }
  return b;
}

// ===== Scale handling =====
function onScaleChange(val) {
  if (val === 'auto') {
    scaleMode = 'auto';
    // Use the most common scale from file
    sf = getMainScale();
  } else {
    scaleMode = 'manual';
    sf = parseFloat(val);
  }
  updateScaleDisplay();
  clearMs();
}

function getMainScale() {
  // Find the group with the most entities and use its scale
  if (groupScales.length === 0) return 100;
  var maxG = 0, maxC = 0;
  for (var g = 0; g < 16; g++) {
    var c = groupTotal(g);
    if (c > maxC) { maxC = c; maxG = g; }
  }
  return groupScales[maxG] || 100;
}

function updateScaleDisplay() {
  var el = document.getElementById('sscale');
  if (sf === 1) {
    el.textContent = '\u751F(mm)';
  } else {
    el.textContent = '1/' + sf;
  }
}

function updateScaleDropdown() {
  var sel = document.getElementById('scalesel');
  // Check if the detected scale is already in the dropdown
  var mainSc = getMainScale();
  var found = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (parseFloat(sel.options[i].value) === mainSc) { found = true; break; }
  }
  // Add irregular scale to dropdown if not present
  if (!found && mainSc > 1) {
    var opt = document.createElement('option');
    opt.value = mainSc;
    opt.textContent = '1/' + mainSc;
    sel.insertBefore(opt, sel.options[sel.options.length]); // append before end
  }
  sel.value = 'auto';
}

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);

  // Grid
  if (sc > 1.5) {
    var gs = 50 * sc; ctx.strokeStyle = '#1c2128'; ctx.lineWidth = 0.4;
    for (var gx = ((tx % gs) + gs) % gs; gx < cv.width; gx += gs) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, cv.height); ctx.stroke();
    }
    for (var gy = ((ty % gs) + gs) % gs; gy < cv.height; gy += gs) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(cv.width, gy); ctx.stroke();
    }
  }

  // Lines - grouped by layer+glayer for visibility filtering
  if (vis.line && LINES.length) {
    var groups = {};
    LINES.forEach(function(l) {
      if (!isEntityVisible(l)) return;
      var key = l.layer + '_' + (l.glayer || 0);
      if (!groups[key]) groups[key] = { layer: l.layer, glayer: l.glayer || 0, items: [] };
      groups[key].items.push(l);
    });
    var sortedKeys = Object.keys(groups);
    for (var ki = 0; ki < sortedKeys.length; ki++) {
      var g = groups[sortedKeys[ki]];
      var color = LAYER_COLORS[g.layer % LAYER_COLORS.length] || '#c9d1d9';
      var lw = penWidth(1, sc);
      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      for (var gi = 0; gi < g.items.length; gi++) {
        var gl = g.items[gi];
        var p1 = S(gl.x1, gl.y1), p2 = S(gl.x2, gl.y2);
        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
      }
      ctx.stroke();
    }
  }

  // Arcs
  if (vis.arc && ARCS.length) {
    ARCS.forEach(function(a) {
      if (!isEntityVisible(a)) return;
      var asx = a.cx * sc + tx, asy = -a.cy * sc + ty, asr = a.r * sc;
      if (asr < 0.3) return;
      if (asx + asr < -50 || asx - asr > cv.width + 50 || asy + asr < -50 || asy - asr > cv.height + 50) return;
      var acolor = LAYER_COLORS[a.layer % LAYER_COLORS.length] || '#a8e6cf';
      ctx.strokeStyle = acolor;
      ctx.lineWidth = penWidth(1, sc);
      ctx.beginPath();
      if (a.cat === 'circle') {
        ctx.arc(asx, asy, asr, 0, Math.PI * 2);
      } else {
        var sweep = a.ea - a.sa;
        var steps = Math.max(16, Math.round(Math.abs(sweep) * 16));
        for (var asi = 0; asi <= steps; asi++) {
          var at = asi / steps;
          var theta = a.sa + sweep * at;
          var apx = asx + asr * Math.cos(theta);
          var apy = asy - asr * Math.sin(theta);
          if (asi === 0) ctx.moveTo(apx, apy); else ctx.lineTo(apx, apy);
        }
      }
      ctx.stroke();
    });
  }

  // Texts
  if (vis.text && sc > 0.3) {
    TEXTS.forEach(function(t) {
      if (!isEntityVisible(t)) return;
      var ts = S(t.x, t.y);
      if (ts.x < -200 || ts.x > cv.width + 200 || ts.y < -200 || ts.y > cv.height + 200) return;
      var fs = Math.max(6, Math.min(22, t.sz * sc * 0.85));
      if (fs < 6) return;
      var tcolor = LAYER_COLORS[t.layer % LAYER_COLORS.length] || '#ffd700';
      ctx.font = fs + 'px "MS Gothic","\uFF2D\uFF33 \u30B4\u30B7\u30C3\u30AF",monospace';
      ctx.save();
      ctx.translate(ts.x, ts.y);
      if (t.angle) ctx.rotate(-t.angle * Math.PI / 180);
      ctx.lineWidth = 2.5; ctx.strokeStyle = '#0d1117';
      ctx.strokeText(t.text, 0, 0);
      ctx.fillStyle = tcolor;
      ctx.fillText(t.text, 0, 0);
      ctx.restore();
    });
  }

  // Measurement
  if (pts.length >= 1) {
    var ms1 = S(pts[0].x, pts[0].y);
    ctx.fillStyle = '#f0883e'; ctx.beginPath(); ctx.arc(ms1.x, ms1.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.fillText('\u2460', ms1.x + 7, ms1.y - 2);
  }
  if (pts.length >= 2) {
    var ms1b = S(pts[0].x, pts[0].y), ms2 = S(pts[1].x, pts[1].y);
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(ms1b.x, ms1b.y); ctx.lineTo(ms2.x, ms2.y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#3fb950'; ctx.beginPath(); ctx.arc(ms2.x, ms2.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillText('\u2461', ms2.x + 7, ms2.y - 2);
    var mdx = pts[0].x - pts[1].x, mdy = pts[0].y - pts[1].y;
    var mmm = Math.sqrt(mdx * mdx + mdy * mdy) * sf;
    var mmx = (ms1b.x + ms2.x) / 2, mmy = (ms1b.y + ms2.y) / 2;
    ctx.font = 'bold 12px monospace';
    ctx.strokeStyle = '#0d1117'; ctx.lineWidth = 3; ctx.strokeText(Math.round(mmm) + 'mm', mmx + 3, mmy - 8);
    ctx.fillStyle = '#3fb950'; ctx.fillText(Math.round(mmm) + 'mm', mmx + 3, mmy - 8);
    pts = [];
  }

  var szEl = document.getElementById('sz');
  if (szEl) szEl.textContent = sc.toFixed(1) + 'x';
}

// ===== File Loading =====
function loadFile(file) {
  if (!file) return;
  var loading = document.getElementById('loading');
  loading.style.display = 'flex';

  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var result = parseJWW(e.target.result);
      LINES = result.lines;
      ARCS = result.arcs;
      TEXTS = result.texts;
      SNAP = result.snap;
      groupScales = result.scales || [];

      // Set scale from file
      initLayers();
      countLayers();

      // Auto-select scale
      sf = getMainScale();
      scaleMode = 'auto';
      updateScaleDropdown();
      updateScaleDisplay();

      // Build layer UI
      curGroup = 0;
      // Find first group with data
      for (var fg = 0; fg < 16; fg++) {
        if (groupTotal(fg) > 0) { curGroup = fg; break; }
      }
      buildLayerUI();
      updateWrapTop();

      document.getElementById('splash').style.display = 'none';
      document.getElementById('fname').textContent = file.name +
        ' (\u7DDA:' + LINES.length + ' \u5F27:' + ARCS.length + ' \u5B57:' + TEXTS.length +
        ' v' + (result.version || '?') + ')';

      loading.style.display = 'none';
      resize();
      fitView();
    } catch (err) {
      loading.style.display = 'none';
      alert('\u8AAD\u307F\u8FBC\u307F\u30A8\u30E9\u30FC: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== UI Controls =====
function setMode(m) {
  mode = m;
  document.getElementById('bv').classList.toggle('on', m === 'view');
  document.getElementById('bm').classList.toggle('on', m === 'measure');
  document.getElementById('mbox').style.display = m === 'measure' ? 'block' : 'none';
  cv.style.cursor = m === 'measure' ? 'crosshair' : 'grab';
  if (m === 'view') clearMs();
}
function clearMs() {
  pts = [];
  document.getElementById('dval').textContent = '---';
  document.getElementById('dunit').textContent = '\u7AEF\u70B9\u306B\u81EA\u52D5\u5438\u7740';
  document.getElementById('ddet').textContent = '';
  document.getElementById('dhint').textContent = '\u2460 1\u70B9\u76EE\u3092\u30AF\u30EA\u30C3\u30AF';
  draw();
}
function doMeasure(sx, sy) {
  var sn = snapPt(sx, sy);
  pts.push(sn ? { x: sn.wx, y: sn.wy } : W(sx, sy));
  if (pts.length === 1) {
    document.getElementById('dhint').textContent = '\u2461 2\u70B9\u76EE\u3092\u30AF\u30EA\u30C3\u30AF' + (sn ? ' \u2713' : '');
    draw();
  } else if (pts.length === 2) {
    var ddx = pts[0].x - pts[1].x, ddy = pts[0].y - pts[1].y;
    var dmm = Math.sqrt(ddx * ddx + ddy * ddy) * sf;
    document.getElementById('dval').textContent = Math.round(dmm);
    document.getElementById('dunit').textContent = 'mm (1/' + sf + ')';
    document.getElementById('ddet').innerHTML = '\u0394X: ' + Math.round(Math.abs(ddx * sf)) + 'mm<br>\u0394Y: ' + Math.round(Math.abs(ddy * sf)) + 'mm';
    document.getElementById('dhint').textContent = 'ESC\u3067\u30AF\u30EA\u30A2';
    draw();
  }
}

// ===== Mouse Events =====
cv.addEventListener('mousedown', function(e) {
  if (mode === 'measure') { doMeasure(e.offsetX, e.offsetY); return; }
  drag = true; dx0 = e.clientX - tx; dy0 = e.clientY - ty; cv.style.cursor = 'grabbing';
});
cv.addEventListener('mousemove', function(e) {
  var w = W(e.offsetX, e.offsetY);
  document.getElementById('sp').textContent = 'X:' + Math.round(w.x * sf) + ' Y:' + Math.round(w.y * sf) + 'mm';
  if (mode === 'measure') {
    var sn = snapPt(e.offsetX, e.offsetY);
    if (sn) { sni.style.display = 'block'; sni.style.left = sn.sx + 'px'; sni.style.top = (sn.sy + 44) + 'px'; }
    else sni.style.display = 'none';
  }
  if (drag && mode === 'view') { tx = e.clientX - dx0; ty = e.clientY - dy0; draw(); }
});
cv.addEventListener('mouseup', function() { drag = false; cv.style.cursor = mode === 'measure' ? 'crosshair' : 'grab'; });
cv.addEventListener('wheel', function(e) {
  e.preventDefault(); var f = e.deltaY < 0 ? 1.15 : 0.87;
  tx = e.offsetX + (tx - e.offsetX) * f; ty = e.offsetY + (ty - e.offsetY) * f; sc *= f; draw();
}, { passive: false });

// ===== Touch Events =====
var lt = 0, lx = 0, ly = 0;
cv.addEventListener('touchstart', function(e) {
  e.preventDefault(); var r = cv.getBoundingClientRect();
  if (mode === 'measure' && e.touches.length === 1) { doMeasure(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); return; }
  if (e.touches.length === 1) { drag = true; dx0 = e.touches[0].clientX - tx; dy0 = e.touches[0].clientY - ty; }
  else if (e.touches.length === 2) {
    lt = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    ly = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
  }
}, { passive: false });
cv.addEventListener('touchmove', function(e) {
  e.preventDefault(); var r = cv.getBoundingClientRect();
  if (e.touches.length === 1 && drag && mode === 'view') { tx = e.touches[0].clientX - dx0; ty = e.touches[0].clientY - dy0; draw(); }
  else if (e.touches.length === 2) {
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    var f = d / lt; tx = cx + (tx - lx) * f; ty = cy + (ty - ly) * f; sc *= f; lt = d; lx = cx; ly = cy; draw();
  }
}, { passive: false });
cv.addEventListener('touchend', function() { drag = false; });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') clearMs(); });
window.addEventListener('resize', resize);
resize();

// Drag & drop
document.body.addEventListener('dragover', function(e) { e.preventDefault(); });
document.body.addEventListener('drop', function(e) {
  e.preventDefault();
  var file = e.dataTransfer.files[0];
  if (file && file.name.toLowerCase().endsWith('.jww')) { loadFile(file); }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
