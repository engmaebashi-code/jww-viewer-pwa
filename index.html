<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>JWW Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Courier New',monospace;overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;height:44px;background:#161b22;
  border-bottom:2px solid #21262d;display:flex;align-items:center;
  padding:0 8px;gap:4px;z-index:100;overflow-x:auto}
#hdr h1{font-size:12px;color:#58a6ff;letter-spacing:2px;white-space:nowrap;margin-right:4px;flex-shrink:0}
.btn{padding:4px 8px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  cursor:pointer;font-size:10px;border-radius:4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#30363d;border-color:#58a6ff}
.btn.on{background:#1f6feb;border-color:#58a6ff;color:#fff}
.btn.open{background:#238636;border-color:#3fb950;color:#fff}
.btn.open:hover{background:#2ea043}
select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  padding:3px 5px;border-radius:4px;font-size:10px;cursor:pointer;flex-shrink:0}
.sep{width:1px;height:24px;background:#30363d;margin:0 2px;flex-shrink:0}
.lbtn{padding:3px 7px;font-size:10px;border-radius:3px;cursor:pointer;
  border:1px solid #30363d;background:#21262d;transition:all .15s;white-space:nowrap;flex-shrink:0}
.lbtn.on{font-weight:bold}
#stbar{position:fixed;bottom:0;left:0;right:0;height:24px;background:#161b22;
  border-top:1px solid #21262d;display:flex;align-items:center;
  padding:0 10px;gap:12px;font-size:10px;color:#8b949e;z-index:100}
.v{color:#58a6ff}
#wrap{position:fixed;top:44px;left:0;right:0;bottom:24px}
canvas{display:block}
#mbox{position:fixed;top:52px;right:8px;background:#161b22;
  border:1px solid #30363d;border-radius:8px;padding:12px 14px;
  min-width:200px;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#mbox h3{font-size:10px;color:#8b949e;margin-bottom:6px}
#dval{font-size:26px;color:#3fb950;font-weight:bold}
#dunit{font-size:10px;color:#8b949e;margin-top:2px}
#ddet{font-size:10px;color:#6e7681;margin-top:5px;line-height:1.8}
#dhint{font-size:11px;color:#f0883e;margin-top:5px}
#sni{position:fixed;display:none;pointer-events:none;z-index:300;
  width:12px;height:12px;border:2px solid #3fb950;border-radius:50%;
  transform:translate(-50%,-50%)}
#splash{position:fixed;top:44px;left:0;right:0;bottom:24px;display:flex;
  align-items:center;justify-content:center;z-index:50;background:#0d1117}
#splash-inner{text-align:center;padding:40px}
#splash-inner h2{font-size:20px;color:#58a6ff;margin-bottom:16px}
#splash-inner p{font-size:13px;color:#8b949e;margin-bottom:24px;line-height:1.6}
#splash-inner .open-large{padding:16px 40px;font-size:16px;background:#238636;
  border:2px solid #3fb950;color:#fff;border-radius:8px;cursor:pointer;
  transition:all .2s}
#splash-inner .open-large:hover{background:#2ea043;transform:scale(1.05)}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,17,23,0.9);
  display:none;align-items:center;justify-content:center;z-index:1000;
  flex-direction:column;gap:12px}
#loading-text{font-size:16px;color:#58a6ff}
#loading-bar{width:280px;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
#loading-fill{width:0%;height:100%;background:#58a6ff;border-radius:3px;transition:width .2s}
#loading-detail{font-size:11px;color:#6e7681}

/* Layer panel */
#lpanel{position:fixed;top:44px;left:0;right:0;background:#161b22;
  border-bottom:2px solid #21262d;display:none;z-index:90;padding:6px 10px;
  font-size:10px}
#lpanel.show{display:block}
#lgroups{display:flex;gap:2px;margin-bottom:4px;align-items:center;flex-wrap:wrap}
#lgroups .glabel{color:#8b949e;margin-right:2px;flex-shrink:0}
.gbtn{padding:2px 6px;border-radius:3px;cursor:pointer;border:1px solid #30363d;
  background:#21262d;color:#6e7681;font-size:10px;transition:all .12s;min-width:22px;text-align:center}
.gbtn.on{background:#1f6feb;border-color:#58a6ff;color:#fff}
.gbtn.has{color:#c9d1d9}
.gbtn.cur{box-shadow:0 0 0 2px #f0883e}
#llayers{display:flex;gap:2px;align-items:center;flex-wrap:wrap}
#llayers .llabel{color:#8b949e;margin-right:2px;flex-shrink:0}
.lbtn2{padding:2px 6px;border-radius:3px;cursor:pointer;border:1px solid #30363d;
  background:#21262d;color:#6e7681;font-size:10px;transition:all .12s;min-width:22px;text-align:center}
.lbtn2.on{font-weight:bold}
.lbtn2.has{color:#c9d1d9}
#linfo{color:#6e7681;font-size:9px;margin-top:3px}

@supports(padding: env(safe-area-inset-top)){
  #hdr{padding-top:env(safe-area-inset-top);height:calc(44px + env(safe-area-inset-top))}
  #wrap{top:calc(44px + env(safe-area-inset-top))}
  #splash{top:calc(44px + env(safe-area-inset-top))}
  #stbar{padding-bottom:env(safe-area-inset-bottom);height:calc(24px + env(safe-area-inset-bottom))}
  #wrap{bottom:calc(24px + env(safe-area-inset-bottom))}
}
@media(min-width:768px){
  .btn{padding:6px 12px;font-size:12px}
  .lbtn{padding:5px 10px;font-size:12px}
  #stbar{font-size:12px}
  select{font-size:12px;padding:4px 8px}
}
</style>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<body>
<div id="hdr">
  <h1>JWW Viewer</h1>
  <button class="btn open" onclick="document.getElementById('filein').click()">&#x1F4C2; &#x958B;&#x304F;</button>
  <input type="file" id="filein" accept=".jww" style="display:none" onchange="loadFile(this.files[0])">
  <div class="sep"></div>
  <button class="btn on" id="bv" onclick="setMode('view')">&#x1F5B1;&#x8868;&#x793A;</button>
  <button class="btn" id="bm" onclick="setMode('measure')">&#x1F4D0;&#x8A08;&#x6E2C;</button>
  <button class="btn" onclick="fitView()">&#x229E;&#x5168;&#x4F53;</button>
  <div class="sep"></div>
  <span style="font-size:10px;color:#8b949e;flex-shrink:0">&#x7E2E;&#x5C3A;</span>
  <select id="scalesel" onchange="onScaleChange(this.value)">
    <option value="auto" selected>&#x81EA;&#x52D5;</option>
    <option value="1">&#x751F;(mm)</option>
    <option value="50">1/50</option>
    <option value="100">1/100</option>
    <option value="200">1/200</option>
    <option value="250">1/250</option>
    <option value="300">1/300</option>
    <option value="500">1/500</option>
  </select>
  <div class="sep"></div>
  <button class="btn" id="layerbtn" onclick="toggleLayerPanel()">&#x1F4CB;&#x30EC;&#x30A4;&#x30E4;&#x30FC;</button>
  <div class="sep"></div>
  <div class="lbtn on" id="tbtn_line" style="color:#e6edf3;border-color:#454e58" onclick="tog('line',this)">&#x7DDA;</div>
  <div class="lbtn on" id="tbtn_arc" style="color:#a8e6cf;border-color:#a8e6cf" onclick="tog('arc',this)">&#x5186;&#x5F27;</div>
  <div class="lbtn on" id="tbtn_text" style="color:#ffd700;border-color:#ffd700" onclick="tog('text',this)">&#x6587;&#x5B57;</div>
  <div class="sep"></div>
  <label style="font-size:10px;color:#8b949e;display:flex;align-items:center;gap:3px;flex-shrink:0">
    <input type="checkbox" id="snp" checked>&#x30B9;&#x30CA;&#x30C3;&#x30D7;
  </label>
  <span id="fname" style="font-size:10px;color:#6e7681;margin-left:8px;flex-shrink:0"></span>
</div>

<!-- Layer Panel (dropdown below header) -->
<div id="lpanel">
  <div id="lgroups"><span class="glabel">G:</span></div>
  <div id="llayers"><span class="llabel">L:</span></div>
  <div id="linfo"></div>
</div>

<div id="wrap"><canvas id="cv"></canvas></div>
<div id="sni"></div>
<div id="mbox">
  <h3>&#x1F4D0; &#x30B9;&#x30CA;&#x30C3;&#x30D7;&#x8A08;&#x6E2C;</h3>
  <div id="dval">---</div>
  <div id="dunit">&#x7AEF;&#x70B9;&#x306B;&#x81EA;&#x52D5;&#x5438;&#x7740;</div>
  <div id="ddet"></div>
  <div id="dhint">&#x2460; 1&#x70B9;&#x76EE;&#x3092;&#x30AF;&#x30EA;&#x30C3;&#x30AF;</div>
  <button class="btn" style="margin-top:8px;width:100%" onclick="clearMs()">&#x30AF;&#x30EA;&#x30A2;(ESC)</button>
</div>
<div id="splash">
  <div id="splash-inner">
    <h2>JWW Viewer v16</h2>
    <p>Jw_cad&#x56F3;&#x9762;&#x30D3;&#x30E5;&#x30FC;&#x30A2;<br>JWW&#x30D5;&#x30A1;&#x30A4;&#x30EB;&#x3092;&#x958B;&#x3044;&#x3066;&#x95B2;&#x89A7;&#x30FB;&#x8A08;&#x6E2C;&#x3067;&#x304D;&#x307E;&#x3059;<br>
    <small style="color:#6e7681">MFC&#x6E96;&#x62E0;&#x30D1;&#x30FC;&#x30B5;&#x30FC;&#x30FB;&#x30EC;&#x30A4;&#x30E4;&#x30FC;&#x5BFE;&#x5FDC;&#x30FB;&#x5927;&#x5BB9;&#x91CF;&#x30D5;&#x30A1;&#x30A4;&#x30EB;&#x5BFE;&#x5FDC;</small></p>
    <button class="open-large" onclick="document.getElementById('filein').click()">&#x1F4C2; JWW&#x30D5;&#x30A1;&#x30A4;&#x30EB;&#x3092;&#x958B;&#x304F;</button>
  </div>
</div>
<div id="loading">
  <div id="loading-text">&#x1F4D0; &#x89E3;&#x6790;&#x4E2D;...</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <div id="loading-detail"></div>
</div>
<div id="stbar">
  &#x30E2;&#x30FC;&#x30C9;:<span class="v" id="sm">&#x8868;&#x793A;</span>
  &nbsp;&#x5EA7;&#x6A19;:<span class="v" id="sp">---</span>
  &nbsp;&#x30BA;&#x30FC;&#x30E0;:<span class="v" id="sz">1x</span>
  &nbsp;&#x7E2E;&#x5C3A;:<span class="v" id="sscale">---</span>
</div>

<script>
// ===== Web Worker for JWW parsing (inline blob) =====
var WORKER_CODE = function() {
  // ===== MFC-aware JWW Binary Parser (v16 - full-file scan, stride-based tag discovery) =====
  self.onmessage = function(e) {
    try {
      var result = parseJWW(e.data);
      // Transfer typed arrays for zero-copy
      var transfer = [result.lineCoords.buffer, result.lineMeta.buffer,
                      result.lineSorted.buffer, result.lineLayerOff.buffer,
                      result.arcData.buffer, result.arcMeta.buffer,
                      result.arcSorted.buffer, result.arcLayerOff.buffer];
      if (result.snapCoords) transfer.push(result.snapCoords.buffer);
      self.postMessage({type: 'done', result: result}, transfer);
    } catch(err) {
      self.postMessage({type: 'error', message: err.message});
    }
  };

  function parseJWW(buffer) {
    var data = new Uint8Array(buffer);
    var view = new DataView(buffer);
    var len = data.length;

    // Validate header
    if (len < 12) throw new Error('JWW\u30D5\u30A1\u30A4\u30EB\u3067\u306F\u3042\u308A\u307E\u305B\u3093');
    var hdr = '';
    for (var hi = 0; hi < 7; hi++) hdr += String.fromCharCode(data[hi]);
    if (hdr !== 'JwwData') throw new Error('JWW\u30D5\u30A1\u30A4\u30EB\u3067\u306F\u3042\u308A\u307E\u305B\u3093');

    var version = view.getUint32(8, true);
    var cdSz = (version >= 351) ? 15 : 13;

    // Pre-allocate typed arrays (grow as needed)
    // Size chunks based on file size (large files have many more entities)
    var LINE_CHUNK = len > 5000000 ? 200000 : 50000;
    var lineCoords = new Float64Array(LINE_CHUNK * 4); // x1,y1,x2,y2
    var lineMeta = new Uint8Array(LINE_CHUNK * 2); // layer, glayer
    var lineCount = 0;

    var ARC_CHUNK = len > 5000000 ? 80000 : 20000;
    var arcData = new Float64Array(ARC_CHUNK * 7); // cx,cy,r,sa,ea,tilt,flat
    var arcMeta = new Uint8Array(ARC_CHUNK * 3); // layer, glayer, isCircle
    var arcCount = 0;

    var texts = [];

    function growLines() {
      var newSize = lineCoords.length + LINE_CHUNK * 4;
      var nc = new Float64Array(newSize);
      nc.set(lineCoords);
      lineCoords = nc;
      var nm = new Uint8Array(lineMeta.length + LINE_CHUNK * 2);
      nm.set(lineMeta);
      lineMeta = nm;
    }

    function growArcs() {
      var newSize = arcData.length + ARC_CHUNK * 7;
      var nd = new Float64Array(newSize);
      nd.set(arcData);
      arcData = nd;
      var nm = new Uint8Array(arcMeta.length + ARC_CHUNK * 3);
      nm.set(arcMeta);
      arcMeta = nm;
    }

    function addLine(x1, y1, x2, y2, layer, glayer) {
      if (lineCount * 4 >= lineCoords.length) growLines();
      var i = lineCount * 4;
      lineCoords[i] = x1; lineCoords[i+1] = y1;
      lineCoords[i+2] = x2; lineCoords[i+3] = y2;
      var mi = lineCount * 2;
      lineMeta[mi] = layer; lineMeta[mi+1] = glayer;
      lineCount++;
    }

    function addArc(cx, cy, r, sa, ea, tilt, flat, layer, glayer, isCircle) {
      if (arcCount * 7 >= arcData.length) growArcs();
      var i = arcCount * 7;
      arcData[i] = cx; arcData[i+1] = cy; arcData[i+2] = r;
      arcData[i+3] = sa; arcData[i+4] = ea;
      arcData[i+5] = tilt; arcData[i+6] = flat;
      var mi = arcCount * 3;
      arcMeta[mi] = layer; arcMeta[mi+1] = glayer; arcMeta[mi+2] = isCircle ? 1 : 0;
      arcCount++;
    }

    // ---- Find ASCII byte sequence in binary ----
    function findStr(str, from) {
      var nl = str.length;
      outer: for (var i = from || 0; i <= len - nl; i++) {
        for (var j = 0; j < nl; j++) {
          if (data[i + j] !== str.charCodeAt(j)) continue outer;
        }
        return i;
      }
      return -1;
    }

    // ---- Find MFC class definition ----
    function findClassDef(className) {
      var pos = findStr(className, 6);
      if (pos < 6) return -1;
      if (view.getUint16(pos - 6, true) === 0xFFFF &&
          view.getUint16(pos - 2, true) === className.length)
        return pos + className.length;
      return -1;
    }

    // ---- Parse CData base header (inline for speed) ----
    var lOff = cdSz === 15 ? 9 : 7;
    var gOff = cdSz === 15 ? 11 : 9;

    function parseCData(off) {
      if (off + cdSz > len) return -1;
      var layer = view.getUint16(off + lOff, true);
      var glayer = view.getUint16(off + gOff, true);
      if (layer > 15 || glayer > 15) return -1;
      return off; // return start offset; caller reads layer/glayer directly
    }

    function getCDLayer(off) { return view.getUint16(off + lOff, true); }
    function getCDGlayer(off) { return view.getUint16(off + gOff, true); }

    // ---- Read MFC CString ----
    function readCStr(pos) {
      if (pos + 1 >= len) return null;
      if (pos + 4 <= len && data[pos] === 0xFF && data[pos+1] === 0xFE && data[pos+2] === 0xFF) {
        var cc, hdr;
        if (data[pos + 3] < 0xFF) {
          cc = data[pos + 3]; hdr = pos + 4;
        } else {
          if (pos + 6 > len) return null;
          var w = view.getUint16(pos + 4, true);
          if (w === 0xFFFF) {
            if (pos + 10 > len) return null;
            cc = view.getUint32(pos + 6, true); hdr = pos + 10;
          } else { cc = w; hdr = pos + 6; }
        }
        if (cc > 50000 || hdr + cc * 2 > len) return null;
        try {
          var decoder = new TextDecoder('utf-16le');
          return { text: decoder.decode(data.subarray(hdr, hdr + cc * 2)), end: hdr + cc * 2 };
        } catch(e) { return null; }
      }
      var bc2, hdr2;
      if (data[pos] < 0xFF) {
        bc2 = data[pos]; hdr2 = pos + 1;
      } else {
        if (pos + 3 > len) return null;
        var w2 = view.getUint16(pos + 1, true);
        if (w2 === 0xFFFF) {
          if (pos + 7 > len) return null;
          bc2 = view.getUint32(pos + 3, true); hdr2 = pos + 7;
        } else { bc2 = w2; hdr2 = pos + 3; }
      }
      if (bc2 > 50000 || hdr2 + bc2 > len) return null;
      if (bc2 === 0) return { text: '', end: hdr2 };
      try {
        var decoder2 = new TextDecoder('shift_jis');
        return { text: decoder2.decode(data.subarray(hdr2, hdr2 + bc2)), end: hdr2 + bc2 };
      } catch(e) { return null; }
    }

    // ===== Read group scales from header =====
    var scales = [];
    try {
      var nameR = readCStr(12);
      if (nameR) {
        var firstScale = nameR.end + 16;
        for (var gi = 0; gi < 16; gi++) {
          var sOff = firstScale + gi * 148;
          if (sOff + 8 <= len) {
            var sv = view.getFloat64(sOff, true);
            if (isFinite(sv) && sv >= 0.1 && sv <= 100000) {
              scales.push(sv);
            } else {
              scales.push(1);
            }
          } else {
            scales.push(1);
          }
        }
      }
    } catch(e) {}
    while (scales.length < 16) scales.push(100);

    // ---- Find all class definition positions for scan boundaries ----
    // Entity types (lines, arcs, text) are interleaved in JWW MFC streams.
    // Non-entity types (CDataTen, CDataSolidFigure, CDataBlock, CDataList)
    // mark the end of the entity data section.
    var senDef = findClassDef('CDataSen');
    var enkDef = findClassDef('CDataEnko');
    var mojiDef = findClassDef('CDataMoji');
    var tenDef = findClassDef('CDataTen');
    var solidDef = findClassDef('CDataSolidFigure');
    var blockDef = findClassDef('CDataBlock');
    var listDef = findClassDef('CDataList');

    // Scan the entire file for entities. CDataSen/Enko/Moji appear both as
    // top-level entities AND embedded inside CDataTen/CDataSunpou/CDataSolid.
    // The same MFC tags are reused for embedded entities throughout the file.
    var scanEnd = len;

    self.postMessage({type: 'progress', pct: 10, detail: '\u30D8\u30C3\u30C0\u30FC\u89E3\u6790\u5B8C\u4E86'});

    // ===== Sequential MFC stream parser =====
    // In JWW, entities (CDataSen, CDataEnko, CDataMoji) are interleaved in the MFC stream.
    // Each class appears once with a full class definition, subsequent instances use 2-byte tags.
    // Tags are assigned in order of first appearance: CDataSen=tag1, CDataEnko=tag2, CDataMoji=tag3.
    // After parsing an entity of known size, the next bytes must be a valid tag.
    // This sequential chaining eliminates false positive tag matches.

    // Step 1: Determine seqStart (first entity data position) from class definitions
    var senTag = -1, enkTag = -1, mojiTag = -1;
    var seqStart = -1;

    // Find earliest entity class def position as search start
    if (senDef > 0) seqStart = senDef;
    if (enkDef > 0 && (seqStart < 0 || enkDef < seqStart)) seqStart = enkDef;
    if (mojiDef > 0 && (seqStart < 0 || mojiDef < seqStart)) seqStart = mojiDef;

    // Step 2: Discover ALL tags by scanning for validated entries
    // MFC tag values depend on m_nMapCount (incremented for both classes AND objects),
    // so tags vary per file. After the first instance (embedded in the FFFF class def),
    // subsequent instances use 2-byte tags. The next entity after a class def may be
    // a DIFFERENT type, so we cannot read senTag from the position after first CDataSen.
    // Instead, discover all tags by validation.
    function isReadableText(s) {
      // Reject strings with too many non-printable/control characters (false positives)
      var bad = 0;
      for (var ci = 0; ci < s.length; ci++) {
        var c = s.charCodeAt(ci);
        // Control characters (0x00-0x1F except tab/newline) are bad indicators
        if (c < 0x20 && c !== 0x09 && c !== 0x0A && c !== 0x0D) bad++;
      }
      return bad === 0 && s.length >= 1; // no control characters at all
    }

    function discoverMojiTag(searchStart, searchEnd, skipTags) {
      var tagCounts = {};
      var maxTag = -1, maxCount = 0;
      // Search near class defs first (limited range to avoid CDataTen/CDataSunpou false positives)
      var limit = Math.min(searchEnd, searchStart + 500000);
      for (var di = searchStart; di < limit - 90; di++) {
        if (!(data[di+1] & 0x80)) continue;
        var dtag = data[di] | (data[di+1] << 8);
        var skip = false;
        for (var si = 0; si < skipTags.length; si++) { if (dtag === skipTags[si]) { skip = true; break; } }
        if (skip) continue;
        var dcd = parseCData(di + 2);
        if (dcd < 0) continue;
        var dao = dcd + cdSz;

        if (dao + 68 <= len) {
          var dmx = view.getFloat64(dao, true), dmy = view.getFloat64(dao+8, true);
          var dmsx = view.getFloat64(dao+36, true);
          if (isFinite(dmx) && isFinite(dmy) && Math.abs(dmx)<=1e7 && Math.abs(dmy)<=1e7 &&
              isFinite(dmsx) && dmsx > 0 && dmsx <= 10000) {
            var dfr = readCStr(dao + 68);
            if (dfr) {
              var dtr = readCStr(dfr.end);
              if (dtr && dtr.text.length > 0 && dtr.text.length < 1000 && isReadableText(dtr.text)) {
                tagCounts[dtag] = (tagCounts[dtag] || 0) + 1;
                if (tagCounts[dtag] > maxCount) { maxCount = tagCounts[dtag]; maxTag = dtag; }
              }
            }
          }
        }
      }
      return maxCount >= 3 ? maxTag : -1;
    }

    // Discover senTag and enkTag by finding consecutive same-tag entities.
    // CDataSen = tag(2)+CData(15)+32 = 49 bytes; CDataEnko = tag(2)+CData(15)+60 = 77 bytes.
    // If same tag appears at pos and pos+49, it's a line tag (stride=49).
    // If same tag appears at pos and pos+77, it's an arc tag (stride=77).
    if (seqStart > 0) {
      var lineStride = 2 + cdSz + 32; // 49 for v700
      var arcStride = 2 + cdSz + 60;  // 77 for v700
      var lineCands = {}, arcCands = {};
      var dlimit = Math.min(scanEnd, seqStart + 2000000);

      for (var di = seqStart; di < dlimit - arcStride - 2; di++) {
        if (!(data[di+1] & 0x80)) continue;
        var dtag = data[di] | (data[di+1] << 8);
        var dcd = parseCData(di + 2);
        if (dcd < 0) continue;

        // Check line stride: same tag at pos + lineStride?
        var lnext = di + lineStride;
        if (lnext + 1 < dlimit && (data[lnext] | (data[lnext+1] << 8)) === dtag) {
          var lcd = parseCData(lnext + 2);
          if (lcd >= 0) {
            lineCands[dtag] = (lineCands[dtag] || 0) + 1;
          }
        }

        // Check arc stride: same tag at pos + arcStride?
        var anext = di + arcStride;
        if (anext + 1 < dlimit && (data[anext] | (data[anext+1] << 8)) === dtag) {
          var acd2 = parseCData(anext + 2);
          if (acd2 >= 0) {
            arcCands[dtag] = (arcCands[dtag] || 0) + 1;
          }
        }
      }

      // Best line tag: highest count in lineCands that isn't a better arc candidate
      var bestLineTag = -1, bestLineCount = 0;
      for (var lt in lineCands) {
        var ltv = parseInt(lt);
        if (lineCands[lt] > bestLineCount && (!(lt in arcCands) || lineCands[lt] > arcCands[lt])) {
          bestLineCount = lineCands[lt]; bestLineTag = ltv;
        }
      }
      // Best arc tag: highest count in arcCands (excluding senTag)
      var bestArcTag = -1, bestArcCount = 0;
      for (var at in arcCands) {
        var atv = parseInt(at);
        if (atv !== bestLineTag && arcCands[at] > bestArcCount) {
          bestArcCount = arcCands[at]; bestArcTag = atv;
        }
      }

      senTag = bestLineTag;
      enkTag = bestArcTag;
      mojiTag = discoverMojiTag(seqStart, scanEnd, [senTag, enkTag]);
      self.postMessage({type: 'progress', pct: 12,
        detail: 'tags: sen=0x' + (senTag>0?senTag.toString(16):'-') + ' enk=0x' + (enkTag>0?enkTag.toString(16):'-') + ' moji=0x' + (mojiTag>0?mojiTag.toString(16):'-')});
    }

    // Step 3: Sequential stream parsing with discovered tags

    // Build a fast lookup: for each known tag's low byte, scan for it
    // Tags are 2 bytes: lowByte | (highByte << 8), where highByte has bit 0x80 set
    var senLo = senTag > 0 ? (senTag & 0xFF) : -1;
    var enkLo = enkTag > 0 ? (enkTag & 0xFF) : -1;
    var mojiLo = mojiTag > 0 ? (mojiTag & 0xFF) : -1;

    if (seqStart > 0 && seqStart < scanEnd) {
      var pos = seqStart;
      var lastPct = 10;
      var progCounter = 0;

      while (pos < scanEnd - 2) {
        // Fast skip: jump to next byte that could be a tag low-byte
        var lo = data[pos];
        var hi = data[pos + 1];

        if (!(hi & 0x80)) {
          // Not a valid MFC tag (high bit must be set) - skip ahead
          pos++;
          continue;
        }

        var t = lo | (hi << 8);

        if (t === senTag) {
          // CDataSen (line): tag(2) + CData(cdSz) + 4 doubles(32)
          var scd = parseCData(pos + 2);
          if (scd >= 0) {
            var so = scd + cdSz;
            if (so + 32 > len) break;
            var lx1 = view.getFloat64(so, true), ly1 = view.getFloat64(so+8, true);
            var lx2 = view.getFloat64(so+16, true), ly2 = view.getFloat64(so+24, true);
            if (isFinite(lx1) && isFinite(ly1) && isFinite(lx2) && isFinite(ly2) &&
                Math.abs(lx1)<1e7 && Math.abs(ly1)<1e7 && Math.abs(lx2)<1e7 && Math.abs(ly2)<1e7) {
              var ll = Math.hypot(lx2-lx1, ly2-ly1);
              if (ll > 0.001 && ll < 1e7)
                addLine(lx1, ly1, lx2, ly2, getCDLayer(scd), getCDGlayer(scd));
            }
            pos = so + 32;
            continue;
          }
        }

        if (t === enkTag) {
          // CDataEnko (arc): tag(2) + CData(cdSz) + 60 bytes
          var acd = parseCData(pos + 2);
          if (acd >= 0) {
            var ao2 = acd + cdSz;
            if (ao2 + 60 > len) break;
            var cx2 = view.getFloat64(ao2, true), cy2 = view.getFloat64(ao2+8, true);
            var r2 = view.getFloat64(ao2+16, true), sa2 = view.getFloat64(ao2+24, true);
            var arcA2 = view.getFloat64(ao2+32, true), tilt2 = view.getFloat64(ao2+40, true);
            var flat2 = view.getFloat64(ao2+48, true), full2 = view.getUint32(ao2+56, true);
            if (isFinite(cx2) && isFinite(cy2) && isFinite(r2) && r2 > 0 && r2 <= 1e7 &&
                Math.abs(cx2) <= 1e7 && Math.abs(cy2) <= 1e7) {
              var isC2 = full2 === 1 || Math.abs(Math.abs(arcA2) - Math.PI * 2) < 0.01;
              addArc(cx2, cy2, r2, sa2, sa2+arcA2, tilt2, flat2,
                     getCDLayer(acd), getCDGlayer(acd), isC2);
            }
            pos = ao2 + 60;
            continue;
          }
        }

        if (t === mojiTag) {
          // CDataMoji (text): tag(2) + CData(cdSz) + 68 bytes + fontStr + textStr
          var mcd = parseCData(pos + 2);
          if (mcd >= 0) {
            var mo2 = mcd + cdSz;
            if (mo2 + 68 > len) break;
            var mx = view.getFloat64(mo2, true), my = view.getFloat64(mo2+8, true);
            var msx = view.getFloat64(mo2+36, true), msy = view.getFloat64(mo2+44, true);
            var mk = view.getFloat64(mo2+60, true);
            if (isFinite(mx) && isFinite(my) && Math.abs(mx)<=1e7 && Math.abs(my)<=1e7 &&
                isFinite(msx) && msx > 0 && msx <= 10000 && isFinite(msy) && msy > 0 && msy <= 10000) {
              var fr = readCStr(mo2 + 68);
              if (fr) {
                var tr = readCStr(fr.end);
                if (tr && tr.text.length > 0) {
                  texts.push({x:mx, y:my, sz:Math.max(msx,msy), text:tr.text, angle:mk,
                              layer:getCDLayer(mcd), glayer:getCDGlayer(mcd)});
                  pos = tr.end;
                  continue;
                }
              }
            }
          }
        }

        pos++;

        // Progress reporting (throttled)
        if (++progCounter > 100000) {
          progCounter = 0;
          var pct = 10 + Math.round((pos - seqStart) / (scanEnd - seqStart) * 75);
          if (pct > lastPct + 2) {
            lastPct = pct;
            self.postMessage({type: 'progress', pct: pct,
              detail: '\u7DDA:' + lineCount + ' \u5F27:' + arcCount + ' \u5B57:' + texts.length});
          }
        }
      }
    }

    self.postMessage({type: 'progress', pct: 85,
      detail: '\u7DDA:' + lineCount + ' \u5F27:' + arcCount + ' \u5B57:' + texts.length + ' \u5B8C\u4E86'});

    // ===== Build snap points (limited) =====
    var SNAP_LIMIT = 15000;
    var snapCount = 0;
    var snapCoords = null;
    if (lineCount <= SNAP_LIMIT) {
      var snapSet = {};
      var snapBuf = new Float64Array(Math.min(lineCount * 4, SNAP_LIMIT * 2) * 2);
      for (var sli = 0; sli < lineCount && snapCount < SNAP_LIMIT; sli++) {
        var si4 = sli * 4;
        for (var sp = 0; sp < 2 && snapCount < SNAP_LIMIT; sp++) {
          var skx = lineCoords[si4 + sp*2], sky = lineCoords[si4 + sp*2 + 1];
          var sk = (Math.round(skx * 10)|0) + ',' + (Math.round(sky * 10)|0);
          if (!snapSet[sk]) {
            snapSet[sk] = 1;
            snapBuf[snapCount * 2] = skx;
            snapBuf[snapCount * 2 + 1] = sky;
            snapCount++;
          }
        }
      }
      snapCoords = snapBuf.subarray(0, snapCount * 2);
    }
    self.postMessage({type: 'progress', pct: 95, detail: 'snap: ' + snapCount + '\u70B9'});

    // Build layer-sorted indices for O(1) per-layer iteration
    // lineByLayer[layer*16+glayer] = [start, count] into lineSorted
    var lineSorted = new Uint32Array(lineCount);
    var lineLayerOff = new Uint32Array(257); // bucket counts, then prefix sums (16*16=256 buckets)
    for (var lsi = 0; lsi < lineCount; lsi++) {
      var lsk = lineMeta[lsi*2] * 16 + lineMeta[lsi*2+1];
      lineLayerOff[lsk]++;
    }
    // prefix sum
    var lsSum = 0;
    for (var lsk2 = 0; lsk2 < 256; lsk2++) {
      var lsCnt = lineLayerOff[lsk2];
      lineLayerOff[lsk2] = lsSum;
      lsSum += lsCnt;
    }
    lineLayerOff[256] = lsSum;
    var lsPos = new Uint32Array(256);
    lsPos.set(lineLayerOff.subarray(0, 256));
    for (var lsi2 = 0; lsi2 < lineCount; lsi2++) {
      var lsk3 = lineMeta[lsi2*2] * 16 + lineMeta[lsi2*2+1];
      lineSorted[lsPos[lsk3]++] = lsi2;
    }

    // Same for arcs
    var arcSorted = new Uint32Array(arcCount);
    var arcLayerOff = new Uint32Array(257);
    for (var asi2 = 0; asi2 < arcCount; asi2++) {
      var ask = arcMeta[asi2*3] * 16 + arcMeta[asi2*3+1];
      arcLayerOff[ask]++;
    }
    var asSum = 0;
    for (var ask2 = 0; ask2 < 256; ask2++) {
      var asCnt = arcLayerOff[ask2];
      arcLayerOff[ask2] = asSum;
      asSum += asCnt;
    }
    arcLayerOff[256] = asSum;
    var asPos = new Uint32Array(256);
    asPos.set(arcLayerOff.subarray(0, 256));
    for (var asi3 = 0; asi3 < arcCount; asi3++) {
      var ask3 = arcMeta[asi3*3] * 16 + arcMeta[asi3*3+1];
      arcSorted[asPos[ask3]++] = asi3;
    }

    // Trim typed arrays
    var trimLC = new Float64Array(lineCount * 4);
    trimLC.set(lineCoords.subarray(0, lineCount * 4));
    var trimLM = new Uint8Array(lineCount * 2);
    trimLM.set(lineMeta.subarray(0, lineCount * 2));
    var trimAD = new Float64Array(arcCount * 7);
    trimAD.set(arcData.subarray(0, arcCount * 7));
    var trimAM = new Uint8Array(arcCount * 3);
    trimAM.set(arcMeta.subarray(0, arcCount * 3));

    lineCoords = null; lineMeta = null; arcData = null; arcMeta = null;

    return {
      lineCoords: trimLC, lineMeta: trimLM, lineCount: lineCount,
      lineSorted: lineSorted, lineLayerOff: lineLayerOff,
      arcData: trimAD, arcMeta: trimAM, arcCount: arcCount,
      arcSorted: arcSorted, arcLayerOff: arcLayerOff,
      texts: texts,
      snapCoords: snapCoords ? new Float64Array(snapCoords) : new Float64Array(0),
      snapCount: snapCount,
      scales: scales, version: version
    };
  }
}.toString();

var LINE_COORDS = null; // Float64Array [x1,y1,x2,y2, ...]
var LINE_META = null;   // Uint8Array [layer,glayer, ...]
var LINE_COUNT = 0;
var LINE_SORTED = null; // Uint32Array - indices sorted by layer*16+glayer
var LINE_LAYER_OFF = null; // Uint32Array[257] - offset table
var ARC_DATA = null;    // Float64Array [cx,cy,r,sa,ea,tilt,flat, ...]
var ARC_META = null;    // Uint8Array [layer,glayer,isCircle, ...]

var TEXTS = [];

// ===== Layer Visibility =====
var glayerVis = [];
var layerVis = [];
var curGroup = 0;
var layerCounts = [];

function initLayers() {
  glayerVis = [];
  layerVis = [];
  layerCounts = [];
  for (var g = 0; g < 16; g++) {
    glayerVis.push(true);
    layerVis.push([]);
    layerCounts.push([]);
    for (var l = 0; l < 16; l++) {
      layerVis[g].push(true);
      layerCounts[g].push(0);
    }
  }
}
initLayers();

function countLayers() {
  var g, l, i, mi;
  for (g = 0; g < 16; g++)
    for (l = 0; l < 16; l++)
      layerCounts[g][l] = 0;

  // Lines (TypedArray)
  for (i = 0; i < LINE_COUNT; i++) {
    mi = i * 2;
    l = LINE_META[mi]; g = LINE_META[mi+1];
    if (g < 16 && l < 16) layerCounts[g][l]++;
  }
  // Arcs (TypedArray)
  for (i = 0; i < ARC_COUNT; i++) {
    mi = i * 3;
    l = ARC_META[mi]; g = ARC_META[mi+1];
    if (g < 16 && l < 16) layerCounts[g][l]++;
  }
  // Texts (object array)
  for (i = 0; i < TEXTS.length; i++) {
    g = TEXTS[i].glayer || 0;
    l = TEXTS[i].layer || 0;
    if (g < 16 && l < 16) layerCounts[g][l]++;
  }
}

function groupTotal(g) {
  var t = 0;
  for (var l = 0; l < 16; l++) t += layerCounts[g][l];
  return t;
}

function tog(k, el) { vis[k] = !vis[k]; el.classList.toggle('on', vis[k]); draw(); }
function resize() { cv.width = cv.parentElement.clientWidth; cv.height = cv.parentElement.clientHeight; draw(); }

function fitView() {
  if (LINE_COUNT === 0 && ARC_COUNT === 0) return;
  var x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  // Lines
  for (var i = 0; i < LINE_COUNT; i++) {
    var mi = i * 2;
    var layer = LINE_META[mi], glayer = LINE_META[mi+1];
    if (!glayerVis[glayer] || !layerVis[glayer][layer]) continue;
    var ci = i * 4;
    var lx1 = LINE_COORDS[ci], ly1 = LINE_COORDS[ci+1];
    var lx2 = LINE_COORDS[ci+2], ly2 = LINE_COORDS[ci+3];
    if (lx1 < x0) x0 = lx1; if (lx2 < x0) x0 = lx2;
    if (lx1 > x1) x1 = lx1; if (lx2 > x1) x1 = lx2;
    if (ly1 < y0) y0 = ly1; if (ly2 < y0) y0 = ly2;
    if (ly1 > y1) y1 = ly1; if (ly2 > y1) y1 = ly2;
  }
  // Arcs
  for (var ai = 0; ai < ARC_COUNT; ai++) {
    var ami = ai * 3;
    if (!glayerVis[ARC_META[ami+1]] || !layerVis[ARC_META[ami+1]][ARC_META[ami]]) continue;
    var adi = ai * 7;
    var acx = ARC_DATA[adi], acy = ARC_DATA[adi+1], ar = ARC_DATA[adi+2];
    if (acx - ar < x0) x0 = acx - ar;
    if (acx + ar > x1) x1 = acx + ar;
    if (acy - ar < y0) y0 = acy - ar;
    if (acy + ar > y1) y1 = acy + ar;
  }
  if (!isFinite(x0)) return;
  var dw = x1 - x0, dh = y1 - y0;
  sc = Math.min(cv.width / dw, cv.height / dh) * 0.88;
  tx = cv.width / 2 - (x0 + dw / 2) * sc;
  ty = cv.height / 2 + (y0 + dh / 2) * sc;
  draw();
}

var S = function(wx, wy) { return { x: wx * sc + tx, y: -wy * sc + ty }; };
var W = function(sx, sy) { return { x: (sx - tx) / sc, y: -(sy - ty) / sc }; };

function snapPt(sx, sy) {
  if (!document.getElementById('snp').checked || !SNAP_COORDS || SNAP_COUNT === 0) return null;
  var b = null, bd = 15;
  for (var i = 0; i < SNAP_COUNT; i++) {
    var wx = SNAP_COORDS[i*2], wy = SNAP_COORDS[i*2+1];
    var px = wx * sc + tx, py = -wy * sc + ty;
    var d = Math.hypot(px - sx, py - sy);
    if (d < bd) { bd = d; b = { wx: wx, wy: wy, sx: px, sy: py }; }
  }
  return b;
}

// ===== Scale handling =====
function onScaleChange(val) {
  if (val === 'auto') {
    scaleMode = 'auto';
    sf = getMainScale();
  } else {
    scaleMode = 'manual';
    sf = parseFloat(val);
  }
  updateScaleDisplay();
  clearMs();
}

function getMainScale() {
  if (groupScales.length === 0) return 100;
  var maxG = 0, maxC = 0;
  for (var g = 0; g < 16; g++) {
    var c = groupTotal(g);
    if (c > maxC) { maxC = c; maxG = g; }
  }
  return groupScales[maxG] || 100;
}

function updateScaleDisplay() {
  var el = document.getElementById('sscale');
  if (sf === 1) {
    el.textContent = '\u751F(mm)';
  } else {
    el.textContent = '1/' + sf;
  }
}

function updateScaleDropdown() {
  var sel = document.getElementById('scalesel');
  var mainSc = getMainScale();
  var found = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (parseFloat(sel.options[i].value) === mainSc) { found = true; break; }
  }
  if (!found && mainSc > 1) {
    var opt = document.createElement('option');
    opt.value = mainSc;
    opt.textContent = '1/' + mainSc;
    sel.insertBefore(opt, sel.options[sel.options.length]);
  }
  sel.value = 'auto';
}

// ===== Optimized draw with TypedArrays =====
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  var cw = cv.width, ch = cv.height;

  // Grid
  if (sc > 1.5) {
    var gs = 50 * sc; ctx.strokeStyle = '#1c2128'; ctx.lineWidth = 0.4;
    for (var gx = ((tx % gs) + gs) % gs; gx < cw; gx += gs) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, ch); ctx.stroke();
    }
    for (var gy = ((ty % gs) + gs) % gs; gy < ch; gy += gs) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(cw, gy); ctx.stroke();
    }
  }

  // Pre-compute layer visibility lookup (flat array for speed)
  var layVis = new Uint8Array(256); // [glayer*16 + layer]
  for (var vg = 0; vg < 16; vg++)
    for (var vl = 0; vl < 16; vl++)
      layVis[vg * 16 + vl] = (glayerVis[vg] && layerVis[vg][vl]) ? 1 : 0;

  // Lines - sorted index, iterate only relevant entities per layer
  if (vis.line && LINE_COUNT > 0 && LINE_SORTED) {
    var lw = penWidth(1, sc);
    ctx.lineWidth = lw;
    for (var lc = 0; lc < 16; lc++) {
      ctx.strokeStyle = LAYER_COLORS[lc];
      ctx.beginPath();
      var lineBN = 0;
      for (var lg = 0; lg < 16; lg++) {
        if (!layVis[lg * 16 + lc]) continue;
        var bk = lc * 16 + lg;
        var bStart = LINE_LAYER_OFF[bk], bEnd = LINE_LAYER_OFF[bk + 1];
        for (var bi = bStart; bi < bEnd; bi++) {
          var li = LINE_SORTED[bi];
          var lci = li * 4;
          var p1x = LINE_COORDS[lci] * sc + tx;
          var p1y = -LINE_COORDS[lci+1] * sc + ty;
          var p2x = LINE_COORDS[lci+2] * sc + tx;
          var p2y = -LINE_COORDS[lci+3] * sc + ty;
          if ((p1x < -10 && p2x < -10) || (p1x > cw+10 && p2x > cw+10) ||
              (p1y < -10 && p2y < -10) || (p1y > ch+10 && p2y > ch+10)) continue;
          ctx.moveTo(p1x, p1y); ctx.lineTo(p2x, p2y);
          lineBN++;
          if (lineBN >= 5000) { ctx.stroke(); ctx.beginPath(); lineBN = 0; }
        }
      }
      if (lineBN > 0) ctx.stroke();
    }
  }

  // Arcs - sorted index, flush every 500 arcs
  if (vis.arc && ARC_COUNT > 0 && ARC_SORTED) {
    var alw = penWidth(1, sc);
    ctx.lineWidth = alw;
    for (var ac = 0; ac < 16; ac++) {
      ctx.strokeStyle = LAYER_COLORS[ac];
      ctx.beginPath();
      var arcBN = 0;
      for (var ag = 0; ag < 16; ag++) {
        if (!layVis[ag * 16 + ac]) continue;
        var abk = ac * 16 + ag;
        var abStart = ARC_LAYER_OFF[abk], abEnd = ARC_LAYER_OFF[abk + 1];
        for (var abi = abStart; abi < abEnd; abi++) {
          var ari = ARC_SORTED[abi];
          var ami = ari * 3;
          var aIsC = ARC_META[ami+2];
          var adi = ari * 7;
          var asx = ARC_DATA[adi] * sc + tx;
          var asy = -ARC_DATA[adi+1] * sc + ty;
          var asr = ARC_DATA[adi+2] * sc;
          if (asr < 0.3) continue;
          if (asx + asr < -50 || asx - asr > cw + 50 || asy + asr < -50 || asy - asr > ch + 50) continue;
          if (aIsC) {
            ctx.moveTo(asx + asr, asy);
            ctx.arc(asx, asy, asr, 0, Math.PI * 2);
          } else {
            var asa = ARC_DATA[adi+3], aea = ARC_DATA[adi+4];
            var sweep = aea - asa;
            var steps = Math.min(200, Math.max(16, Math.round(Math.abs(sweep) * 16)));
            for (var asi = 0; asi <= steps; asi++) {
              var theta = asa + sweep * (asi / steps);
              var apx = asx + asr * Math.cos(theta);
              var apy = asy - asr * Math.sin(theta);
              if (asi === 0) ctx.moveTo(apx, apy); else ctx.lineTo(apx, apy);
            }
          }
          arcBN++;
          if (arcBN >= 500) { ctx.stroke(); ctx.beginPath(); arcBN = 0; }
        }
      }
      if (arcBN > 0) ctx.stroke();
    }
  }

  // Texts (limit visible count to prevent OOM on large files)
  if (vis.text && sc > 0.3) {
    var textDrawn = 0, TEXT_MAX = 2000;
    for (var ti = 0; ti < TEXTS.length && textDrawn < TEXT_MAX; ti++) {
      var t = TEXTS[ti];
      var tg = t.glayer || 0, tl = t.layer || 0;
      if (!layVis[tg * 16 + tl]) continue;
      var tsx = t.x * sc + tx, tsy = -t.y * sc + ty;
      if (tsx < -200 || tsx > cw + 200 || tsy < -200 || tsy > ch + 200) continue;
      var fs = Math.max(6, Math.min(22, t.sz * sc * 0.85));
      if (fs < 6) continue;
      var tcolor = LAYER_COLORS[tl] || '#ffd700';
      ctx.font = fs + 'px "MS Gothic","\uFF2D\uFF33 \u30B4\u30B7\u30C3\u30AF",monospace';
      ctx.save();
      ctx.translate(tsx, tsy);
      if (t.angle) ctx.rotate(-t.angle * Math.PI / 180);
      ctx.lineWidth = 2.5; ctx.strokeStyle = '#0d1117';
      ctx.strokeText(t.text, 0, 0);
      ctx.fillStyle = tcolor;
      ctx.fillText(t.text, 0, 0);
      ctx.restore();
      textDrawn++;
    }
  }

  // Measurement
  if (pts.length >= 1) {
    var ms1 = S(pts[0].x, pts[0].y);
    ctx.fillStyle = '#f0883e'; ctx.beginPath(); ctx.arc(ms1.x, ms1.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.fillText('\u2460', ms1.x + 7, ms1.y - 2);
  }
  if (pts.length >= 2) {
    var ms1b = S(pts[0].x, pts[0].y), ms2 = S(pts[1].x, pts[1].y);
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(ms1b.x, ms1b.y); ctx.lineTo(ms2.x, ms2.y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#3fb950'; ctx.beginPath(); ctx.arc(ms2.x, ms2.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillText('\u2461', ms2.x + 7, ms2.y - 2);
    var mdx = pts[0].x - pts[1].x, mdy = pts[0].y - pts[1].y;
    var mmm = Math.sqrt(mdx * mdx + mdy * mdy) * sf;
    var mmx = (ms1b.x + ms2.x) / 2, mmy = (ms1b.y + ms2.y) / 2;
    ctx.font = 'bold 12px monospace';
    ctx.strokeStyle = '#0d1117'; ctx.lineWidth = 3; ctx.strokeText(Math.round(mmm) + 'mm', mmx + 3, mmy - 8);
    ctx.fillStyle = '#3fb950'; ctx.fillText(Math.round(mmm) + 'mm', mmx + 3, mmy - 8);
    pts = [];
  }

  var szEl = document.getElementById('sz');
  if (szEl) szEl.textContent = sc.toFixed(1) + 'x';
}

// ===== File Loading (Web Worker) =====
var currentWorker = null;

function loadFile(file) {
  if (!file) return;
  var loading = document.getElementById('loading');
  var loadText = document.getElementById('loading-text');
  var loadFill = document.getElementById('loading-fill');
  var loadDetail = document.getElementById('loading-detail');
  loading.style.display = 'flex';
  loadText.textContent = '\u{1F4D0} \u89E3\u6790\u4E2D... (' + (file.size / 1024 / 1024).toFixed(1) + 'MB)';
  loadFill.style.width = '0%';
  loadDetail.textContent = '';

  // Kill previous worker if running
  if (currentWorker) { currentWorker.terminate(); currentWorker = null; }

  var reader = new FileReader();
  reader.onload = function(e) {
    var worker = new Worker(workerUrl);
    currentWorker = worker;

    worker.onmessage = function(msg) {
      var d = msg.data;
      if (d.type === 'progress') {
        loadFill.style.width = d.pct + '%';
        loadDetail.textContent = d.detail || '';
        return;
      }
      if (d.type === 'error') {
        loading.style.display = 'none';
        alert('\u8AAD\u307F\u8FBC\u307F\u30A8\u30E9\u30FC: ' + d.message);
        currentWorker = null;
        return;
      }
      if (d.type === 'done') {
        var r = d.result;
        LINE_COORDS = r.lineCoords;
        LINE_META = r.lineMeta;
        LINE_COUNT = r.lineCount;
        LINE_SORTED = r.lineSorted;
        LINE_LAYER_OFF = r.lineLayerOff;
        ARC_DATA = r.arcData;
        ARC_META = r.arcMeta;
        ARC_COUNT = r.arcCount;
        ARC_SORTED = r.arcSorted;
        ARC_LAYER_OFF = r.arcLayerOff;
        TEXTS = r.texts;
        SNAP_COORDS = r.snapCoords;
        SNAP_COUNT = r.snapCount;
        groupScales = r.scales || [];

        initLayers();
        countLayers();

        sf = getMainScale();
        scaleMode = 'auto';
        updateScaleDropdown();
        updateScaleDisplay();

        curGroup = 0;
        for (var fg = 0; fg < 16; fg++) {
          if (groupTotal(fg) > 0) { curGroup = fg; break; }
        }
        buildLayerUI();
        updateWrapTop();

        document.getElementById('splash').style.display = 'none';
        document.getElementById('fname').textContent = file.name +
          ' (\u7DDA:' + LINE_COUNT + ' \u5F27:' + ARC_COUNT + ' \u5B57:' + TEXTS.length +
          ' v' + (r.version || '?') + ')';


        loading.style.display = 'none';
        currentWorker = null;
        resize();
        fitView();
      }
    };

    worker.onerror = function(err) {
      loading.style.display = 'none';
      alert('\u30D1\u30FC\u30B5\u30FC\u30A8\u30E9\u30FC: ' + (err.message || 'unknown'));
      currentWorker = null;
    };

    // Transfer buffer to worker (zero-copy)
    worker.postMessage(e.target.result, [e.target.result]);
  };
  reader.readAsArrayBuffer(file);
}

// ===== UI Controls =====
function setMode(m) {
  mode = m;
  document.getElementById('bv').classList.toggle('on', m === 'view');
  document.getElementById('bm').classList.toggle('on', m === 'measure');
  document.getElementById('mbox').style.display = m === 'measure' ? 'block' : 'none';
  cv.style.cursor = m === 'measure' ? 'crosshair' : 'grab';
  if (m === 'view') clearMs();
}
function clearMs() {
  pts = [];
  document.getElementById('dval').textContent = '---';
  document.getElementById('dunit').textContent = '\u7AEF\u70B9\u306B\u81EA\u52D5\u5438\u7740';
  document.getElementById('ddet').textContent = '';
  document.getElementById('dhint').textContent = '\u2460 1\u70B9\u76EE\u3092\u30AF\u30EA\u30C3\u30AF';
  draw();
}
function doMeasure(sx, sy) {
  var sn = snapPt(sx, sy);
  pts.push(sn ? { x: sn.wx, y: sn.wy } : W(sx, sy));
  if (pts.length === 1) {
    document.getElementById('dhint').textContent = '\u2461 2\u70B9\u76EE\u3092\u30AF\u30EA\u30C3\u30AF' + (sn ? ' \u2713' : '');
    draw();
  } else if (pts.length === 2) {
    var ddx = pts[0].x - pts[1].x, ddy = pts[0].y - pts[1].y;
    var dmm = Math.sqrt(ddx * ddx + ddy * ddy) * sf;
    document.getElementById('dval').textContent = Math.round(dmm);
    document.getElementById('dunit').textContent = 'mm (1/' + sf + ')';
    document.getElementById('ddet').innerHTML = '\u0394X: ' + Math.round(Math.abs(ddx * sf)) + 'mm<br>\u0394Y: ' + Math.round(Math.abs(ddy * sf)) + 'mm';
    document.getElementById('dhint').textContent = 'ESC\u3067\u30AF\u30EA\u30A2';
    draw();
  }
}

// ===== Mouse Events =====
cv.addEventListener('mousedown', function(e) {
  if (mode === 'measure') { doMeasure(e.offsetX, e.offsetY); return; }
  drag = true; dx0 = e.clientX - tx; dy0 = e.clientY - ty; cv.style.cursor = 'grabbing';
});
cv.addEventListener('mousemove', function(e) {
  var w = W(e.offsetX, e.offsetY);
  document.getElementById('sp').textContent = 'X:' + Math.round(w.x * sf) + ' Y:' + Math.round(w.y * sf) + 'mm';
  if (mode === 'measure') {
    var sn = snapPt(e.offsetX, e.offsetY);
    if (sn) { sni.style.display = 'block'; sni.style.left = sn.sx + 'px'; sni.style.top = (sn.sy + 44) + 'px'; }
    else sni.style.display = 'none';
  }
  if (drag && mode === 'view') { tx = e.clientX - dx0; ty = e.clientY - dy0; draw(); }
});
cv.addEventListener('mouseup', function() { drag = false; cv.style.cursor = mode === 'measure' ? 'crosshair' : 'grab'; });
cv.addEventListener('wheel', function(e) {
  e.preventDefault(); var f = e.deltaY < 0 ? 1.15 : 0.87;
  tx = e.offsetX + (tx - e.offsetX) * f; ty = e.offsetY + (ty - e.offsetY) * f; sc *= f; draw();
}, { passive: false });

// ===== Touch Events =====
var lt = 0, lx = 0, ly = 0;
cv.addEventListener('touchstart', function(e) {
  e.preventDefault(); var r = cv.getBoundingClientRect();
  if (mode === 'measure' && e.touches.length === 1) { doMeasure(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); return; }
  if (e.touches.length === 1) { drag = true; dx0 = e.touches[0].clientX - tx; dy0 = e.touches[0].clientY - ty; }
  else if (e.touches.length === 2) {
    lt = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    ly = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
  }
}, { passive: false });
cv.addEventListener('touchmove', function(e) {
  e.preventDefault(); var r = cv.getBoundingClientRect();
  if (e.touches.length === 1 && drag && mode === 'view') { tx = e.touches[0].clientX - dx0; ty = e.touches[0].clientY - dy0; draw(); }
  else if (e.touches.length === 2) {
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    var f = d / lt; tx = cx + (tx - lx) * f; ty = cy + (ty - ly) * f; sc *= f; lt = d; lx = cx; ly = cy; draw();
  }
}, { passive: false });
cv.addEventListener('touchend', function() { drag = false; });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') clearMs(); });
window.addEventListener('resize', resize);
resize();

// Drag & drop
document.body.addEventListener('dragover', function(e) { e.preventDefault(); });
document.body.addEventListener('drop', function(e) {
  e.preventDefault();
  var file = e.dataTransfer.files[0];
  if (file && file.name.toLowerCase().endsWith('.jww')) { loadFile(file); }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
