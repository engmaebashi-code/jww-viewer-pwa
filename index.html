<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>JWW Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Courier New',monospace;overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;height:44px;background:#161b22;
  border-bottom:2px solid #21262d;display:flex;align-items:center;
  padding:0 8px;gap:4px;z-index:100;overflow-x:auto}
#hdr h1{font-size:12px;color:#58a6ff;letter-spacing:2px;white-space:nowrap;margin-right:4px;flex-shrink:0}
.btn{padding:4px 8px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  cursor:pointer;font-size:10px;border-radius:4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:hover{background:#30363d;border-color:#58a6ff}
.btn.on{background:#1f6feb;border-color:#58a6ff;color:#fff}
.btn.open{background:#238636;border-color:#3fb950;color:#fff}
.btn.open:hover{background:#2ea043}
select{background:#21262d;border:1px solid #30363d;color:#c9d1d9;
  padding:3px 5px;border-radius:4px;font-size:10px;cursor:pointer;flex-shrink:0}
.sep{width:1px;height:24px;background:#30363d;margin:0 2px;flex-shrink:0}
.lbtn{padding:3px 7px;font-size:10px;border-radius:3px;cursor:pointer;
  border:1px solid #30363d;background:#21262d;transition:all .15s;white-space:nowrap;flex-shrink:0}
.lbtn.on{font-weight:bold}
#stbar{position:fixed;bottom:0;left:0;right:0;height:24px;background:#161b22;
  border-top:1px solid #21262d;display:flex;align-items:center;
  padding:0 10px;gap:12px;font-size:10px;color:#8b949e;z-index:100}
.v{color:#58a6ff}
#wrap{position:fixed;top:44px;left:0;right:0;bottom:24px}
canvas{display:block}
#mbox{position:fixed;top:52px;right:8px;background:#161b22;
  border:1px solid #30363d;border-radius:8px;padding:12px 14px;
  min-width:200px;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#mbox h3{font-size:10px;color:#8b949e;margin-bottom:6px}
#dval{font-size:26px;color:#3fb950;font-weight:bold}
#dunit{font-size:10px;color:#8b949e;margin-top:2px}
#ddet{font-size:10px;color:#6e7681;margin-top:5px;line-height:1.8}
#dhint{font-size:11px;color:#f0883e;margin-top:5px}
#sni{position:fixed;display:none;pointer-events:none;z-index:300;
  width:12px;height:12px;border:2px solid #3fb950;border-radius:50%;
  transform:translate(-50%,-50%)}
#splash{position:fixed;top:44px;left:0;right:0;bottom:24px;display:flex;
  align-items:center;justify-content:center;z-index:50;background:#0d1117}
#splash-inner{text-align:center;padding:40px}
#splash-inner h2{font-size:20px;color:#58a6ff;margin-bottom:16px}
#splash-inner p{font-size:13px;color:#8b949e;margin-bottom:24px;line-height:1.6}
#splash-inner .open-large{padding:16px 40px;font-size:16px;background:#238636;
  border:2px solid #3fb950;color:#fff;border-radius:8px;cursor:pointer;
  transition:all .2s}
#splash-inner .open-large:hover{background:#2ea043;transform:scale(1.05)}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,17,23,0.9);
  display:none;align-items:center;justify-content:center;z-index:1000;font-size:16px;color:#58a6ff}

@supports(padding: env(safe-area-inset-top)){
  #hdr{padding-top:env(safe-area-inset-top);height:calc(44px + env(safe-area-inset-top))}
  #wrap{top:calc(44px + env(safe-area-inset-top))}
  #splash{top:calc(44px + env(safe-area-inset-top))}
  #stbar{padding-bottom:env(safe-area-inset-bottom);height:calc(24px + env(safe-area-inset-bottom))}
  #wrap{bottom:calc(24px + env(safe-area-inset-bottom))}
}
@media(min-width:768px){
  .btn{padding:6px 12px;font-size:12px}
  .lbtn{padding:5px 10px;font-size:12px}
  #stbar{font-size:12px}
  select{font-size:12px;padding:4px 8px}
}
</style>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JWW Viewer">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#161b22">
</head>
<body>
<div id="hdr">
  <h1>JWW Viewer</h1>
  <button class="btn open" onclick="document.getElementById('filein').click()">📂 開く</button>
  <input type="file" id="filein" accept=".jww" style="display:none" onchange="loadFile(this.files[0])">
  <div class="sep"></div>
  <button class="btn on" id="bv" onclick="setMode('view')">🖱表示</button>
  <button class="btn" id="bm" onclick="setMode('measure')">📐計測</button>
  <button class="btn" onclick="fitView()">⊡全体</button>
  <div class="sep"></div>
  <span style="font-size:10px;color:#8b949e;flex-shrink:0">縮尺</span>
  <select id="scalesel" onchange="sf=parseFloat(this.value);clearMs()">
    <option value="1">生(mm)</option>
    <option value="100" selected>1/100</option>
    <option value="50">1/50</option>
    <option value="200">1/200</option>
    <option value="250">1/250</option>
    <option value="300">1/300</option>
    <option value="500">1/500</option>
  </select>
  <div class="sep"></div>
  <div class="lbtn on" id="tbtn_line" style="color:#e6edf3;border-color:#454e58" onclick="tog('line',this)">線</div>
  <div class="lbtn on" id="tbtn_arc" style="color:#a8e6cf;border-color:#a8e6cf" onclick="tog('arc',this)">円弧</div>
  <div class="lbtn on" id="tbtn_text" style="color:#ffd700;border-color:#ffd700" onclick="tog('text',this)">文字</div>
  <div class="sep"></div>
  <label style="font-size:10px;color:#8b949e;display:flex;align-items:center;gap:3px;flex-shrink:0">
    <input type="checkbox" id="snp" checked>スナップ
  </label>
  <span id="fname" style="font-size:10px;color:#6e7681;margin-left:8px;flex-shrink:0"></span>
</div>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="sni"></div>
<div id="mbox">
  <h3>📐 スナップ計測</h3>
  <div id="dval">---</div>
  <div id="dunit">端点に自動吸着</div>
  <div id="ddet"></div>
  <div id="dhint">① 1点目をクリック</div>
  <button class="btn" style="margin-top:8px;width:100%" onclick="clearMs()">クリア(ESC)</button>
</div>
<div id="splash">
  <div id="splash-inner">
    <h2>JWW Viewer v10</h2>
    <p>Jw_cad図面ビューア<br>JWWファイルを開いて閲覧・計測できます<br>
    <small style="color:#6e7681">ペン太さ・レイヤー色対応</small></p>
    <button class="open-large" onclick="document.getElementById('filein').click()">📂 JWWファイルを開く</button>
  </div>
</div>
<div id="loading">📐 解析中...</div>
<div id="stbar">
  モード:<span class="v" id="sm">表示</span>
  &nbsp;座標:<span class="v" id="sp">---</span>
  &nbsp;ズーム:<span class="v" id="sz">1x</span>
</div>

<script>
// ===== JWW Layer Colors (dark background optimized) =====
const LAYER_COLORS = [
  '#e6edf3', // Layer 0: white
  '#58a6ff', // Layer 1: cyan/blue
  '#3fb950', // Layer 2: green
  '#bc8cff', // Layer 3: magenta
  '#388bfd', // Layer 4: blue
  '#d29922', // Layer 5: yellow
  '#f0883e', // Layer 6: orange
  '#f85149', // Layer 7: red
  '#c9d1d9', // Layer 8: light gray
  '#79c0ff', // Layer 9: light cyan
  '#56d364', // Layer 10: light green
  '#d2a8ff', // Layer 11: light magenta
  '#6cb6ff', // Layer 12: medium blue
  '#e3b341', // Layer 13: gold
  '#ffa657', // Layer 14: light orange
  '#ff7b72', // Layer 15: light red
];

// Pen number to line width multiplier
function penWidth(pen, sc) {
  const base = Math.max(0.4, sc * 0.03);
  switch (pen) {
    case 1: return base;
    case 2: return base * 2.5;
    case 3: return base * 3.5;
    case 4: return base * 4;
    case 5: return base * 4.5;
    case 6: return base * 5;
    case 7: return base * 5.5;
    case 8: return base * 6;
    default: return base;
  }
}

// ===== JWW Binary Parser =====
function parseJWW(buffer) {
  const data = new Uint8Array(buffer);
  const view = new DataView(buffer);
  const len = data.length;

  const sig = String.fromCharCode(...data.slice(0, 7));
  if (sig !== 'JwwData') throw new Error('JWWファイルではありません');

  const lines = [];
  const arcs = [];
  const texts = [];
  const decoder = new TextDecoder('shift_jis');

  // Scan for line records (marker 0x01, 0x80) - 47 bytes each
  // Structure: marker(2) + 4bytes + pen(1) + layer(1) + 5bytes + x1(8) + y1(8) + x2(8) + y2(8)
  for (let i = 0; i < len - 47; i++) {
    if (data[i] === 0x01 && data[i + 1] === 0x80) {
      const x1 = view.getFloat64(i + 15, true);
      const y1 = view.getFloat64(i + 23, true);
      const x2 = view.getFloat64(i + 31, true);
      const y2 = view.getFloat64(i + 39, true);

      if (isFinite(x1) && isFinite(y1) && isFinite(x2) && isFinite(y2) &&
          Math.abs(x1) < 50000 && Math.abs(y1) < 50000 &&
          Math.abs(x2) < 50000 && Math.abs(y2) < 50000) {
        const lineLen = Math.hypot(x2 - x1, y2 - y1);
        if (lineLen > 0.01 && lineLen < 100000) {
          const pen = data[i + 6];    // pen number (line weight)
          const layer = data[i + 7];  // layer number (color)
          lines.push({ x1, y1, x2, y2, pen, layer });
        }
      }
    }
  }

  // Scan for arc records (marker 0xCA, 0x80) - 75 bytes each
  for (let i = 0; i < len - 75; i++) {
    if (data[i] === 0xCA && data[i + 1] === 0x80) {
      const cx = view.getFloat64(i + 15, true);
      const cy = view.getFloat64(i + 23, true);
      const r = view.getFloat64(i + 31, true);
      const sa = view.getFloat64(i + 39, true);
      const sweep = view.getFloat64(i + 47, true);

      if (isFinite(cx) && isFinite(cy) && isFinite(r) && isFinite(sa) && isFinite(sweep) &&
          Math.abs(cx) < 50000 && Math.abs(cy) < 50000 &&
          r > 0 && r < 50000) {
        const ea = sa + sweep;
        const isCircle = Math.abs(Math.abs(sweep) - Math.PI * 2) < 0.01;
        const pen = data[i + 6];
        const layer = data[i + 7];
        arcs.push({ cx, cy, r, sa, ea, cat: isCircle ? 'circle' : 'arc', pen, layer });
      }
    }
  }

  // Scan for text records (marker 0x0F, 0x80)
  for (let i = 0; i < len - 85; i++) {
    if (data[i] === 0x0F && data[i + 1] === 0x80) {
      try {
        const x1 = view.getFloat64(i + 15, true);
        const y1 = view.getFloat64(i + 23, true);
        const szW = view.getFloat64(i + 51, true);
        const szH = view.getFloat64(i + 59, true);

        if (!isFinite(x1) || !isFinite(y1) || !isFinite(szW) || !isFinite(szH)) continue;
        if (Math.abs(x1) > 50000 || Math.abs(y1) > 50000) continue;
        if (szW <= 0 || szW > 1000 || szH <= 0 || szH > 1000) continue;

        const fontLen = data[i + 83];
        if (fontLen > 100) continue;
        const textLenOff = i + 84 + fontLen;
        if (textLenOff >= len) continue;
        const textLen = data[textLenOff];
        if (textLen === 0 || textLen > 500) continue;
        const textStart = textLenOff + 1;
        if (textStart + textLen > len) continue;

        const textBytes = data.slice(textStart, textStart + textLen);
        let text;
        try { text = decoder.decode(textBytes); } catch (e) { continue; }
        if (text.length === 0) continue;

        const layer = data[i + 7];
        texts.push({ x: x1, y: y1, sz: Math.max(szW, szH), text, layer });
      } catch (e) { continue; }
    }
  }

  // Build snap points
  const snap = [];
  const snapSet = new Set();
  for (const l of lines) {
    for (const [x, y] of [[l.x1, l.y1], [l.x2, l.y2]]) {
      const k = Math.round(x * 10) + ',' + Math.round(y * 10);
      if (!snapSet.has(k)) { snapSet.add(k); snap.push([x, y]); }
    }
  }

  return { lines, arcs, texts, snap };
}

// ===== Viewer State =====
let LINES = [], ARCS = [], TEXTS = [], SNAP = [];
let vis = { line: true, arc: true, text: true };
let sf = 100;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const sni = document.getElementById('sni');
let mode = 'view', tx = 0, ty = 0, sc = 1, drag = false, dx0 = 0, dy0 = 0, pts = [];

function tog(k, el) { vis[k] = !vis[k]; el.classList.toggle('on', vis[k]); draw(); }
function resize() { cv.width = cv.parentElement.clientWidth; cv.height = cv.parentElement.clientHeight; draw(); }

function fitView() {
  if (LINES.length === 0 && ARCS.length === 0) return;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  LINES.forEach(l => {
    x0 = Math.min(x0, l.x1, l.x2); x1 = Math.max(x1, l.x1, l.x2);
    y0 = Math.min(y0, l.y1, l.y2); y1 = Math.max(y1, l.y1, l.y2);
  });
  ARCS.forEach(a => {
    x0 = Math.min(x0, a.cx - a.r); x1 = Math.max(x1, a.cx + a.r);
    y0 = Math.min(y0, a.cy - a.r); y1 = Math.max(y1, a.cy + a.r);
  });
  if (!isFinite(x0)) return;
  const dw = x1 - x0, dh = y1 - y0;
  sc = Math.min(cv.width / dw, cv.height / dh) * 0.88;
  tx = cv.width / 2 - (x0 + dw / 2) * sc;
  ty = cv.height / 2 + (y0 + dh / 2) * sc;
  draw();
}

const S = (wx, wy) => ({ x: wx * sc + tx, y: -wy * sc + ty });
const W = (sx, sy) => ({ x: (sx - tx) / sc, y: -(sy - ty) / sc });

function snapPt(sx, sy) {
  if (!document.getElementById('snp').checked) return null;
  let b = null, bd = 15;
  for (const [wx, wy] of SNAP) {
    const s = S(wx, wy), d = Math.hypot(s.x - sx, s.y - sy);
    if (d < bd) { bd = d; b = { wx, wy, sx: s.x, sy: s.y }; }
  }
  return b;
}

function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);

  // Grid
  if (sc > 1.5) {
    const gs = 50 * sc; ctx.strokeStyle = '#1c2128'; ctx.lineWidth = 0.4;
    for (let x = ((tx % gs) + gs) % gs; x < cv.width; x += gs) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, cv.height); ctx.stroke();
    }
    for (let y = ((ty % gs) + gs) % gs; y < cv.height; y += gs) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cv.width, y); ctx.stroke();
    }
  }

  // Lines - grouped by pen+layer for efficient rendering
  if (vis.line && LINES.length) {
    const groups = {};
    LINES.forEach(l => {
      const key = l.pen + '_' + l.layer;
      if (!groups[key]) groups[key] = { pen: l.pen, layer: l.layer, items: [] };
      groups[key].items.push(l);
    });

    // Draw thin lines first, then thick (so thick walls render on top)
    const sortedKeys = Object.keys(groups).sort((a, b) => groups[a].pen - groups[b].pen);

    for (const key of sortedKeys) {
      const g = groups[key];
      const color = LAYER_COLORS[g.layer % LAYER_COLORS.length] || '#c9d1d9';
      const lw = penWidth(g.pen, sc);

      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      for (const l of g.items) {
        const p1 = S(l.x1, l.y1), p2 = S(l.x2, l.y2);
        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
      }
      ctx.stroke();
    }
  }

  // Arcs (polyline rendering) - with pen weight and layer color
  if (vis.arc && ARCS.length) {
    ARCS.forEach(a => {
      const sx = a.cx * sc + tx, sy = -a.cy * sc + ty, sr = a.r * sc;
      if (sr < 0.3) return;
      if (sx + sr < -50 || sx - sr > cv.width + 50 || sy + sr < -50 || sy - sr > cv.height + 50) return;

      const color = LAYER_COLORS[a.layer % LAYER_COLORS.length] || '#a8e6cf';
      ctx.strokeStyle = color;
      ctx.lineWidth = penWidth(a.pen || 1, sc);
      ctx.beginPath();

      if (a.cat === 'circle') {
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      } else {
        const sweep = a.ea - a.sa;
        const steps = Math.max(16, Math.round(Math.abs(sweep) * 16));
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          const theta = a.sa + sweep * t;
          const px = sx + sr * Math.cos(theta);
          const py = sy - sr * Math.sin(theta);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
      }
      ctx.stroke();
    });
  }

  // Texts - with layer color
  if (vis.text && sc > 0.3) {
    TEXTS.forEach(t => {
      const s = S(t.x, t.y);
      if (s.x < -200 || s.x > cv.width + 200 || s.y < -200 || s.y > cv.height + 200) return;
      const fs = Math.max(6, Math.min(22, t.sz * sc * 0.85));
      if (fs < 6) return;
      const color = LAYER_COLORS[t.layer % LAYER_COLORS.length] || '#ffd700';
      ctx.font = `${fs}px "MS Gothic","ＭＳ ゴシック",monospace`;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.lineWidth = 2.5; ctx.strokeStyle = '#0d1117';
      ctx.strokeText(t.text, 0, 0);
      ctx.fillStyle = color;
      ctx.fillText(t.text, 0, 0);
      ctx.restore();
    });
  }

  // Measurement points
  if (pts.length >= 1) {
    const s1 = S(pts[0].x, pts[0].y);
    ctx.fillStyle = '#f0883e'; ctx.beginPath(); ctx.arc(s1.x, s1.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.fillText('①', s1.x + 7, s1.y - 2);
  }
  if (pts.length >= 2) {
    const s1 = S(pts[0].x, pts[0].y), s2 = S(pts[1].x, pts[1].y);
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#3fb950'; ctx.beginPath(); ctx.arc(s2.x, s2.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillText('②', s2.x + 7, s2.y - 2);
    const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    const mm = Math.sqrt(dx * dx + dy * dy) * sf;
    const mx = (s1.x + s2.x) / 2, my = (s1.y + s2.y) / 2;
    ctx.font = 'bold 12px monospace';
    ctx.strokeStyle = '#0d1117'; ctx.lineWidth = 3; ctx.strokeText(Math.round(mm) + 'mm', mx + 3, my - 8);
    ctx.fillStyle = '#3fb950'; ctx.fillText(Math.round(mm) + 'mm', mx + 3, my - 8);
    pts = [];
  }

  const szEl = document.getElementById('sz');
  if (szEl) szEl.textContent = sc.toFixed(1) + 'x';
}

// ===== File Loading =====
function loadFile(file) {
  if (!file) return;
  const loading = document.getElementById('loading');
  loading.style.display = 'flex';

  const reader = new FileReader();
  reader.onload = function (e) {
    try {
      const result = parseJWW(e.target.result);
      LINES = result.lines;
      ARCS = result.arcs;
      TEXTS = result.texts;
      SNAP = result.snap;

      document.getElementById('splash').style.display = 'none';
      document.getElementById('fname').textContent = file.name +
        ' (線:' + LINES.length + ' 弧:' + ARCS.length + ' 字:' + TEXTS.length + ')';

      loading.style.display = 'none';
      resize();
      fitView();
    } catch (err) {
      loading.style.display = 'none';
      alert('読み込みエラー: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== UI Controls =====
function setMode(m) {
  mode = m;
  document.getElementById('bv').classList.toggle('on', m === 'view');
  document.getElementById('bm').classList.toggle('on', m === 'measure');
  document.getElementById('mbox').style.display = m === 'measure' ? 'block' : 'none';
  cv.style.cursor = m === 'measure' ? 'crosshair' : 'grab';
  if (m === 'view') clearMs();
}
function clearMs() {
  pts = [];
  document.getElementById('dval').textContent = '---';
  document.getElementById('dunit').textContent = '端点に自動吸着';
  document.getElementById('ddet').textContent = '';
  document.getElementById('dhint').textContent = '① 1点目をクリック';
  draw();
}
function doMeasure(sx, sy) {
  const sn = snapPt(sx, sy);
  pts.push(sn ? { x: sn.wx, y: sn.wy } : W(sx, sy));
  if (pts.length === 1) {
    document.getElementById('dhint').textContent = '② 2点目をクリック' + (sn ? ' ✓' : '');
    draw();
  } else if (pts.length === 2) {
    const dx = pts[0].x - pts[1].x, dy = pts[0].y - pts[1].y;
    const mm = Math.sqrt(dx * dx + dy * dy) * sf;
    document.getElementById('dval').textContent = Math.round(mm);
    document.getElementById('dunit').textContent = 'mm (1/' + sf + ')';
    document.getElementById('ddet').innerHTML = 'ΔX: ' + Math.round(Math.abs(dx * sf)) + 'mm<br>ΔY: ' + Math.round(Math.abs(dy * sf)) + 'mm';
    document.getElementById('dhint').textContent = 'ESCでクリア';
    draw();
  }
}

// ===== Mouse Events =====
cv.addEventListener('mousedown', e => {
  if (mode === 'measure') { doMeasure(e.offsetX, e.offsetY); return; }
  drag = true; dx0 = e.clientX - tx; dy0 = e.clientY - ty; cv.style.cursor = 'grabbing';
});
cv.addEventListener('mousemove', e => {
  const w = W(e.offsetX, e.offsetY);
  document.getElementById('sp').textContent = 'X:' + Math.round(w.x * sf) + ' Y:' + Math.round(w.y * sf) + 'mm';
  if (mode === 'measure') {
    const sn = snapPt(e.offsetX, e.offsetY);
    if (sn) { sni.style.display = 'block'; sni.style.left = sn.sx + 'px'; sni.style.top = (sn.sy + 44) + 'px'; }
    else sni.style.display = 'none';
  }
  if (drag && mode === 'view') { tx = e.clientX - dx0; ty = e.clientY - dy0; draw(); }
});
cv.addEventListener('mouseup', () => { drag = false; cv.style.cursor = mode === 'measure' ? 'crosshair' : 'grab'; });
cv.addEventListener('wheel', e => {
  e.preventDefault(); const f = e.deltaY < 0 ? 1.15 : 0.87;
  tx = e.offsetX + (tx - e.offsetX) * f; ty = e.offsetY + (ty - e.offsetY) * f; sc *= f; draw();
}, { passive: false });

// ===== Touch Events =====
let lt = 0, lx = 0, ly = 0;
cv.addEventListener('touchstart', e => {
  e.preventDefault(); const r = cv.getBoundingClientRect();
  if (mode === 'measure' && e.touches.length === 1) { doMeasure(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); return; }
  if (e.touches.length === 1) { drag = true; dx0 = e.touches[0].clientX - tx; dy0 = e.touches[0].clientY - ty; }
  else if (e.touches.length === 2) {
    lt = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    ly = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
  }
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault(); const r = cv.getBoundingClientRect();
  if (e.touches.length === 1 && drag && mode === 'view') { tx = e.touches[0].clientX - dx0; ty = e.touches[0].clientY - dy0; draw(); }
  else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    const f = d / lt; tx = cx + (tx - lx) * f; ty = cy + (ty - ly) * f; sc *= f; lt = d; lx = cx; ly = cy; draw();
  }
}, { passive: false });
cv.addEventListener('touchend', () => { drag = false; });
document.addEventListener('keydown', e => { if (e.key === 'Escape') clearMs(); });
window.addEventListener('resize', resize);
resize();

// Drag & drop support
document.body.addEventListener('dragover', e => { e.preventDefault(); });
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.toLowerCase().endsWith('.jww')) { loadFile(file); }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
